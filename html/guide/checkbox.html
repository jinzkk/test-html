<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox 컴포넌트 가이드</title>
  <link rel="stylesheet" href="../../css/common.css">
</head>
<body>
  <header>
    <h1>Checkbox 컴포넌트 가이드</h1>
  </header>

  <main>
    <!-- Size L -->
    <section class="guide_section">
      <h2 class="guide_section_title">Checkbox - Size L (24px)</h2>
      <div class="guide_row">
        <!-- On -->
        <div class="guide_item">
          <label class="checkbox_wrap">
            <input type="checkbox" class="checkbox_native" checked>
            <span class="checkbox_box checkbox_box_size_l checkbox_box_on"></span>
            <span class="checkbox_text checkbox_text_size_l">On</span>
          </label>
        </div>

        <!-- Indeterminate -->
        <div class="guide_item">
          <label class="checkbox_wrap">
            <input type="checkbox" class="checkbox_native">
            <span class="checkbox_box checkbox_box_size_l checkbox_box_indeterminate"></span>
            <span class="checkbox_text checkbox_text_size_l">Indeterminate</span>
          </label>
        </div>

        <!-- Off -->
        <div class="guide_item">
          <label class="checkbox_wrap">
            <input type="checkbox" class="checkbox_native">
            <span class="checkbox_box checkbox_box_size_l checkbox_box_off"></span>
            <span class="checkbox_text checkbox_text_size_l">Off</span>
          </label>
        </div>

        <!-- On Disabled -->
        <div class="guide_item">
          <label class="checkbox_wrap checkbox_wrap_disabled">
            <input type="checkbox" class="checkbox_native" checked disabled>
            <span class="checkbox_box checkbox_box_size_l checkbox_box_on_disabled"></span>
            <span class="checkbox_text checkbox_text_size_l checkbox_text_disabled">On Disabled</span>
          </label>
        </div>

        <!-- Off Disabled -->
        <div class="guide_item">
          <label class="checkbox_wrap checkbox_wrap_disabled">
            <input type="checkbox" class="checkbox_native" disabled>
            <span class="checkbox_box checkbox_box_size_l checkbox_box_off_disabled"></span>
            <span class="checkbox_text checkbox_text_size_l checkbox_text_disabled">Off Disabled</span>
          </label>
        </div>
      </div>
    </section>

    <!-- Size M -->
    <section class="guide_section">
      <h2 class="guide_section_title">Checkbox - Size M (20px)</h2>
      <div class="guide_row">
        <!-- On -->
        <div class="guide_item">
          <label class="checkbox_wrap">
            <input type="checkbox" class="checkbox_native" checked>
            <span class="checkbox_box checkbox_box_size_m checkbox_box_on"></span>
            <span class="checkbox_text checkbox_text_size_m">On</span>
          </label>
        </div>

        <!-- Indeterminate -->
        <div class="guide_item">
          <label class="checkbox_wrap">
            <input type="checkbox" class="checkbox_native">
            <span class="checkbox_box checkbox_box_size_m checkbox_box_indeterminate"></span>
            <span class="checkbox_text checkbox_text_size_m">Indeterminate</span>
          </label>
        </div>

        <!-- Off -->
        <div class="guide_item">
          <label class="checkbox_wrap">
            <input type="checkbox" class="checkbox_native">
            <span class="checkbox_box checkbox_box_size_m checkbox_box_off"></span>
            <span class="checkbox_text checkbox_text_size_m">Off</span>
          </label>
        </div>

        <!-- On Disabled -->
        <div class="guide_item">
          <label class="checkbox_wrap checkbox_wrap_disabled">
            <input type="checkbox" class="checkbox_native" checked disabled>
            <span class="checkbox_box checkbox_box_size_m checkbox_box_on_disabled"></span>
            <span class="checkbox_text checkbox_text_size_m checkbox_text_disabled">On Disabled</span>
          </label>
        </div>

        <!-- Off Disabled -->
        <div class="guide_item">
          <label class="checkbox_wrap checkbox_wrap_disabled">
            <input type="checkbox" class="checkbox_native" disabled>
            <span class="checkbox_box checkbox_box_size_m checkbox_box_off_disabled"></span>
            <span class="checkbox_text checkbox_text_size_m checkbox_text_disabled">Off Disabled</span>
          </label>
        </div>
      </div>
    </section>

    <!-- Size Sub -->
    <section class="guide_section">
      <h2 class="guide_section_title">Checkbox - Size Sub (20px, 서브)</h2>
      <div class="guide_row">
        <!-- On -->
        <div class="guide_item">
          <label class="checkbox_wrap">
            <input type="checkbox" class="checkbox_native" checked>
            <span class="checkbox_box checkbox_box_size_sub checkbox_box_on"></span>
            <span class="checkbox_text checkbox_text_size_m">On</span>
          </label>
        </div>

        <!-- Indeterminate -->
        <div class="guide_item">
          <label class="checkbox_wrap">
            <input type="checkbox" class="checkbox_native">
            <span class="checkbox_box checkbox_box_size_sub checkbox_box_indeterminate"></span>
            <span class="checkbox_text checkbox_text_size_m">Indeterminate</span>
          </label>
        </div>

        <!-- Off -->
        <div class="guide_item">
          <label class="checkbox_wrap">
            <input type="checkbox" class="checkbox_native">
            <span class="checkbox_box checkbox_box_size_sub checkbox_box_off"></span>
            <span class="checkbox_text checkbox_text_size_m">Off</span>
          </label>
        </div>

        <!-- On Disabled -->
        <div class="guide_item">
          <label class="checkbox_wrap checkbox_wrap_disabled">
            <input type="checkbox" class="checkbox_native" checked disabled>
            <span class="checkbox_box checkbox_box_size_sub checkbox_box_on_disabled"></span>
            <span class="checkbox_text checkbox_text_size_m checkbox_text_disabled">On Disabled</span>
          </label>
        </div>

        <!-- Off Disabled -->
        <div class="guide_item">
          <label class="checkbox_wrap checkbox_wrap_disabled">
            <input type="checkbox" class="checkbox_native" disabled>
            <span class="checkbox_box checkbox_box_size_sub checkbox_box_off_disabled"></span>
            <span class="checkbox_text checkbox_text_size_m checkbox_text_disabled">Off Disabled</span>
          </label>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 HTML5 프로젝트 - Checkbox 컴포넌트 가이드</p>
  </footer>

  <!-- jQuery 로드 -->
  <script src="../../js/lib/jquery-3.7.1.min.js"></script>
  <!-- 공통 JS 로드 -->
  <script src="../../js/common.js"></script>
  <script>
    // 체크박스 클릭 시 상태 클래스 토글 (disabled 제외)
    $(function () {
      $('.checkbox-wrap:not(.checkbox-wrap--disabled)').on('click', function (e) {
        var $box = $(this).find('.checkbox-box');

        // 상태 클래스 순환: off → on → indeterminate → off
        if ($box.hasClass('checkbox_box_off')) {
          $box.removeClass('checkbox_box_off').addClass('checkbox_box_on');
        } else if ($box.hasClass('checkbox_box_on')) {
          $box.removeClass('checkbox_box_on').addClass('checkbox_box_indeterminate');
        } else if ($box.hasClass('checkbox_box_indeterminate')) {
          $box.removeClass('checkbox_box_indeterminate').addClass('checkbox_box_off');
        }
      });
    });
  </script>
</body>
</html>
