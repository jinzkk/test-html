<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 포트폴리오 제안 생성 중</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root {
      --primary: #1345d1;
      --primary-light: #e8edfc;
    }

    .page-header {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 56px;
      background: #fff;
      border-bottom: 1px solid #E6E9EF;
      display: flex; align-items: center;
      padding: 0 8px 0 4px;
      z-index: 100;
    }
    .page-header__back {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      background: none; border: none; cursor: pointer; color: #232433;
    }
    .page-header__title {
      flex: 1; font-size: 18px; font-weight: 700; color: #232433; margin: 0;
    }

    /* 로딩 페이지 전체 레이아웃 */
    body {
      display: flex;
      flex-direction: column;
    }
    .loading-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
      padding: 40px 24px;
      text-align: center;
    }

    /* 파이차트 일러스트 */
    .pie-illust {
      width: 160px;
      height: 160px;
      position: relative;
      margin-bottom: 32px;
    }
    .pie-illust__bg {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: conic-gradient(
        var(--primary) 0deg 126deg,
        #6c8fff 126deg 230deg,
        #b3c4ff 230deg 295deg,
        #d6e0ff 295deg 360deg
      );
      box-shadow: 0 8px 24px rgba(19, 69, 209, 0.25);
      animation: rotateSlow 4s linear infinite;
    }
    .pie-illust__center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 70px; height: 70px;
      background: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .pie-illust__center svg {
      color: var(--primary);
    }
    @keyframes rotateSlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 텍스트 */
    .loading-text {
      font-size: 24px;
      font-weight: 800;
      color: #232433;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    .loading-text em {
      color: var(--primary);
      font-style: normal;
    }
    .loading-sub {
      font-size: 14px;
      color: #71747C;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* 로딩 점 3개 */
    .loading-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .loading-dots__dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--primary);
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .loading-dots__dot:nth-child(1) { animation-delay: 0s; }
    .loading-dots__dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots__dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- B형 헤더 -->
  <header class="page-header">
    <button class="page-header__back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1 class="page-header__title">포트폴리오 제안</h1>
  </header>

  <main>
    <div class="loading-page">
      <!-- 파이차트 일러스트 -->
      <div class="pie-illust">
        <div class="pie-illust__bg"></div>
        <div class="pie-illust__center">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
      </div>

      <!-- 텍스트 -->
      <h2 class="loading-text">
        <em>5,000만원</em> 기준으로<br>
        월배당 홀릭 포트를<br>
        만들어 드릴게요.
      </h2>
      <p class="loading-sub">잠시만 기다려주세요.<br>최적의 포트폴리오를 구성하고 있습니다.</p>

      <!-- 로딩 점 -->
      <div class="loading-dots">
        <span class="loading-dots__dot"></span>
        <span class="loading-dots__dot"></span>
        <span class="loading-dots__dot"></span>
      </div>
    </div>
  </main>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
</body>
</html>
