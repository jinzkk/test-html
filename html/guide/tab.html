<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab 컴포넌트 가이드</title>
  <link rel="stylesheet" href="../../css/common.css">
</head>
<body>
  <header>
    <h1>Tab 컴포넌트 가이드</h1>
  </header>

  <main>
    <!-- Tab/Small (pill형 소형) -->
    <section class="guide-section">
      <h2 class="guide-section-title">Tab / Small (Pill형 소형)</h2>
      <div class="guide-row">
        <div class="guide-item">
          <div class="tab-small">
            <button class="tab-small__item tab-small__item--active" data-tab-group="small">탭 1</button>
            <button class="tab-small__item" data-tab-group="small">탭 2</button>
            <button class="tab-small__item" data-tab-group="small">탭 3</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab/Top (pill형 전체너비) -->
    <section class="guide-section">
      <h2 class="guide-section-title">Tab / Top (Pill형 전체너비)</h2>
      <div class="guide-row">
        <div class="guide-item">
          <div class="tab-top">
            <button class="tab-top__item tab-top__item--active" data-tab-group="top">탭 1</button>
            <button class="tab-top__item" data-tab-group="top">탭 2</button>
            <button class="tab-top__item" data-tab-group="top">탭 3</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab/Medium (버튼형) -->
    <section class="guide-section">
      <h2 class="guide-section-title">Tab / Medium (버튼형)</h2>
      <div class="guide-row">
        <div class="guide-item">
          <div class="tab-medium">
            <button class="tab-medium__item tab-medium__item--active" data-tab-group="medium">탭 1</button>
            <button class="tab-medium__item" data-tab-group="medium">탭 2</button>
            <button class="tab-medium__item" data-tab-group="medium">탭 3</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab_Line/Small (언더라인형) -->
    <section class="guide-section">
      <h2 class="guide-section-title">Tab_Line / Small (언더라인형)</h2>
      <div class="guide-row">
        <div class="guide-item" style="width: 312px;">
          <div class="tab-line-small">
            <button class="tab-line-small__item tab-line-small__item--active" data-tab-group="line-small">탭 1</button>
            <button class="tab-line-small__item" data-tab-group="line-small">탭 2</button>
            <button class="tab-line-small__item" data-tab-group="line-small">탭 3</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab_Line/Large (언더라인형 대형) -->
    <section class="guide-section">
      <h2 class="guide-section-title">Tab_Line / Large (언더라인형 대형)</h2>
      <div class="guide-row">
        <div class="guide-item" style="width: 312px;">
          <div class="tab-line-large">
            <button class="tab-line-large__item tab-line-large__item--active" data-tab-group="line-large">탭 1</button>
            <button class="tab-line-large__item" data-tab-group="line-large">탭 2</button>
            <button class="tab-line-large__item" data-tab-group="line-large">탭 3</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 HTML5 프로젝트 - Tab 컴포넌트 가이드</p>
  </footer>

  <!-- jQuery 로드 -->
  <script src="../../js/lib/jquery-3.7.1.min.js"></script>
  <!-- 공통 JS 로드 -->
  <script src="../../js/common.js"></script>
  <script>
    // 탭 클릭 이벤트 처리
    $(function () {
      // Tab/Small
      $('[data-tab-group="small"]').on('click', function () {
        $('[data-tab-group="small"]').removeClass('tab-small__item--active');
        $(this).addClass('tab-small__item--active');
      });

      // Tab/Top
      $('[data-tab-group="top"]').on('click', function () {
        $('[data-tab-group="top"]').removeClass('tab-top__item--active');
        $(this).addClass('tab-top__item--active');
      });

      // Tab/Medium
      $('[data-tab-group="medium"]').on('click', function () {
        $('[data-tab-group="medium"]').removeClass('tab-medium__item--active');
        $(this).addClass('tab-medium__item--active');
      });

      // Tab_Line/Small
      $('[data-tab-group="line-small"]').on('click', function () {
        $('[data-tab-group="line-small"]').removeClass('tab-line-small__item--active');
        $(this).addClass('tab-line-small__item--active');
      });

      // Tab_Line/Large
      $('[data-tab-group="line-large"]').on('click', function () {
        $('[data-tab-group="line-large"]').removeClass('tab-line-large__item--active');
        $(this).addClass('tab-line-large__item--active');
      });
    });
  </script>
</body>
</html>
