<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 생년월일 입력</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root { --primary: #1345d1; }

    body { background: #fff; margin: 0; font-family: 'Pretendard', sans-serif; }

    .page-header {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 56px; background: #fff;
      display: flex; align-items: center; padding: 0 20px; z-index: 100;
    }
    .btn-back { background: none; border: none; cursor: pointer; padding: 0; }

    main { padding: 56px 20px 20px; }
    .page-title { font-size: 24px; font-weight: 700; line-height: 32px; color: #141924; margin: 16px 0 32px; }

    .input-group { display: flex; flex-direction: column; gap: 24px; }
    .input-wrap { display: flex; flex-direction: column; gap: 8px; }
    .input-label { font-size: 12px; font-weight: 500; color: #141924; line-height: 18px; }
    .input-field--filled {
      width: 100%; padding: 12px 16px; border: 1px solid #b4bbcb; border-radius: 4px;
      font-size: 16px; font-weight: 500; color: #141924; line-height: 24px;
      box-sizing: border-box; background: #fff;
    }

    /* 오버레이 */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 300;
    }
    .overlay.is-open { display: block; }

    /* 롤러 패널 */
    .roller-panel {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #fff; border-radius: 27px 27px 0 0; z-index: 400;
      padding: 24px 16px 32px; box-sizing: border-box;
      transform: translateY(100%); transition: transform 0.3s ease;
    }
    .roller-panel.is-open { transform: translateY(0); }

    /* 롤러 */
    .roller-container {
      display: flex; position: relative; margin-bottom: 16px; height: 176px;
      overflow: hidden;
    }
    .roller-highlight {
      position: absolute; left: 0; right: 0; height: 48px;
      background: #f2f3f8; border-radius: 8px;
      top: 50%; transform: translateY(-50%); pointer-events: none; z-index: 1;
    }
    /* 위아래 페이드 */
    .roller-container::before,
    .roller-container::after {
      content: ''; position: absolute; left: 0; right: 0; height: 35%; z-index: 3; pointer-events: none;
    }
    .roller-container::before {
      top: 0; background: linear-gradient(to bottom, rgba(255,255,255,0.95), transparent);
    }
    .roller-container::after {
      bottom: 0; background: linear-gradient(to top, rgba(255,255,255,0.95), transparent);
    }

    .roller-col {
      flex: 1; overflow: hidden; position: relative;
      display: flex; flex-direction: column; align-items: center;
    }
    .roller-col-inner {
      display: flex; flex-direction: column; align-items: center;
      transition: transform 0.15s ease;
    }
    .roller-item {
      height: 32px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #8a949e; line-height: 24px; width: 100%;
      text-align: center;
    }
    .roller-item.is-sel {
      height: 48px; font-size: 24px; font-weight: 500; color: #1e2124;
    }

    .btn-next {
      width: 100%; height: 52px; background: #1345d1; border: none; border-radius: 8px;
      font-size: 18px; font-weight: 500; color: #fff; cursor: pointer;
      font-family: 'Pretendard', sans-serif;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <button class="btn-back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="#141924" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <main>
    <h1 class="page-title">생년월일을 알려주세요</h1>
    <div class="input-group">
      <!-- 현재 입력: 생년월일 -->
      <div class="input-wrap">
        <div class="input-label">생년월일</div>
        <button id="bdBtn" onclick="openRoller()"
          style="width:100%; padding:12px 16px; border:1px solid #e5e8ef; border-radius:4px;
                 font-size:16px; font-family:Pretendard,sans-serif; color:#b4bbcb;
                 line-height:24px; background:#fff; text-align:left; cursor:pointer; box-sizing:border-box;">
          <span id="bdDisplay">생년월일</span>
        </button>
      </div>
      <!-- 이전 입력: 이름 -->
      <div class="input-wrap">
        <div class="input-label">이름</div>
        <div class="input-field--filled">김한투</div>
      </div>
    </div>
  </main>

  <div class="overlay" id="overlay" onclick="closeRoller()"></div>

  <!-- 롤러 패널 -->
  <div class="roller-panel" id="rollerPanel">
    <div class="roller-container">
      <div class="roller-highlight"></div>
      <div class="roller-col" id="colYear"><div class="roller-col-inner" id="innerYear"></div></div>
      <div class="roller-col" id="colMonth"><div class="roller-col-inner" id="innerMonth"></div></div>
      <div class="roller-col" id="colDay"><div class="roller-col-inner" id="innerDay"></div></div>
    </div>
    <button class="btn-next" onclick="confirmDate()">다음</button>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    var selY = 1999, selM = 1, selD = 23;
    var yearList = [], monthList = [], dayList = [];

    for (var y = 1940; y <= 2010; y++) yearList.push(y);
    for (var m = 1; m <= 12; m++) monthList.push(m);

    function buildDays() {
      dayList = [];
      var max = new Date(selY, selM, 0).getDate();
      for (var d = 1; d <= max; d++) dayList.push(d);
      if (selD > max) selD = max;
    }

    var ITEM_H = 32, SEL_H = 48, COL_H = 176;

    function renderCol(innerId, list, selected) {
      var $inner = $('#' + innerId);
      $inner.empty();
      list.forEach(function(v) {
        var cls = (v === selected) ? 'roller-item is-sel' : 'roller-item';
        $inner.append('<div class="' + cls + '">' + v + '</div>');
      });
      // 상하 패딩 (선택 항목이 가운데 오도록)
      var topPad = (COL_H / 2) - (SEL_H / 2);
      $inner.css('padding-top', topPad + 'px').css('padding-bottom', topPad + 'px');
      // 위치 조정
      var selIdx = list.indexOf(selected);
      var offset = -(selIdx * ITEM_H);
      $inner.css('transform', 'translateY(' + offset + 'px)');
    }

    function setupCol(colId, innerId, list, getSelected, setSelected, callback) {
      var $col = $('#' + colId);
      var $inner = $('#' + innerId);
      var startY, startOffset;

      function getTranslate() {
        var mat = $inner.css('transform');
        if (!mat || mat === 'none') return 0;
        var m = mat.match(/translateY\(([-\d.]+)px\)/);
        if (m) return parseFloat(m[1]);
        var arr = mat.match(/matrix\([^,]+,[^,]+,[^,]+,[^,]+,[^,]+,([^)]+)\)/);
        return arr ? parseFloat(arr[1]) : 0;
      }

      function snap(offset) {
        var idx = Math.round(-offset / ITEM_H);
        idx = Math.max(0, Math.min(list.length - 1, idx));
        setSelected(list[idx]);
        if (callback) callback();
        renderCol(innerId, list, list[idx]);
        setupCol(colId, innerId, list, getSelected, setSelected, callback);
      }

      $col.off('touchstart mousedown').on('touchstart', function(e) {
        startY = e.originalEvent.touches[0].clientY;
        startOffset = getTranslate();
        $inner.css('transition', 'none');
      }).on('touchmove', function(e) {
        e.preventDefault();
        var dy = e.originalEvent.touches[0].clientY - startY;
        $inner.css('transform', 'translateY(' + (startOffset + dy) + 'px)');
      }).on('touchend', function() {
        snap(getTranslate());
      });

      $col.on('mousedown', function(e) {
        startY = e.clientY; startOffset = getTranslate();
        $inner.css('transition', 'none');
        $(document).on('mousemove.rc', function(ev) {
          var dy = ev.clientY - startY;
          $inner.css('transform', 'translateY(' + (startOffset + dy) + 'px)');
        }).on('mouseup.rc', function() {
          snap(getTranslate());
          $(document).off('mousemove.rc mouseup.rc');
        });
      });
    }

    function initRoller() {
      buildDays();
      renderCol('innerYear', yearList, selY);
      renderCol('innerMonth', monthList, selM);
      renderCol('innerDay', dayList, selD);

      setupCol('colYear', 'innerYear', yearList, function() { return selY; }, function(v) { selY = v; }, function() {
        buildDays();
        renderCol('innerDay', dayList, selD);
        setupCol('colDay', 'innerDay', dayList, function() { return selD; }, function(v) { selD = v; }, null);
      });
      setupCol('colMonth', 'innerMonth', monthList, function() { return selM; }, function(v) { selM = v; }, function() {
        buildDays();
        renderCol('innerDay', dayList, selD);
        setupCol('colDay', 'innerDay', dayList, function() { return selD; }, function(v) { selD = v; }, null);
      });
      setupCol('colDay', 'innerDay', dayList, function() { return selD; }, function(v) { selD = v; }, null);
    }

    function openRoller() {
      $('#overlay').addClass('is-open');
      $('#rollerPanel').addClass('is-open');
      initRoller();
    }

    function closeRoller() {
      $('#overlay').removeClass('is-open');
      $('#rollerPanel').removeClass('is-open');
    }

    function confirmDate() {
      var text = selY + '년 ' + selM + '월 ' + selD + '일';
      $('#bdDisplay').text(text);
      $('#bdBtn').css({ 'border-color': '#b4bbcb', 'color': '#141924' });
      closeRoller();
    }
  </script>
</body>
</html>
