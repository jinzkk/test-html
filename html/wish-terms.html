<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 서비스 약관 동의</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root { --primary: #1345d1; }
    * { box-sizing: border-box; }
    body { background: #fff; margin: 0; font-family: 'Pretendard', sans-serif; }

    .page_header {
      position: fixed; top: 0; left: 0; width: 100%; height: 56px; background: #fff;
      display: flex; align-items: center; padding: 0 20px; z-index: 100;
    }
    .btn_back { background: none; border: none; cursor: pointer; padding: 0; }

    main { padding: 56px 20px 100px; }
    .page_title { font-size: 24px; font-weight: 700; color: #141924; line-height: 32px; margin: 20px 0 28px; }

    /* 전체 동의 박스 */
    .all_agree {
      background: #f2f3f8; border-radius: 8px; padding: 18px 16px;
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px; cursor: pointer;
    }
    .checkbox_all {
      width: 24px; height: 24px; border: 2px solid #d0d3dc; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; flex: 0 0 24px;
      background: #fff; transition: all 0.15s;
    }
    .checkbox_all.checked { background: #1345d1; border-color: #1345d1; }
    .all_agree_label { font-size: 16px; font-weight: 700; color: #141924; }

    /* 항목 목록 */
    .terms_list { display: flex; flex-direction: column; gap: 0; }
    .terms_item {
      display: flex; align-items: center; gap: 12px; padding: 14px 0;
      border-bottom: 1px solid #f2f3f8; cursor: pointer;
    }
    .terms_item:last-child { border-bottom: none; }
    .checkbox_item {
      width: 20px; height: 20px; border-radius: 4px; background: #1345d1;
      display: flex; align-items: center; justify-content: center; flex: 0 0 20px;
      transition: all 0.15s;
    }
    .checkbox_item.unchecked { background: #f2f3f8; border: 1.5px solid #d0d3dc; }
    .terms_label { flex: 1; font-size: 15px; color: #141924; line-height: 22px; }
    .terms_badge {
      font-size: 11px; font-weight: 700; color: #697387; margin-right: 4px;
    }
    .terms_badge.required { color: #1345d1; }
    .terms_arrow { color: #b4bbcb; }

    /* 마케팅 설명 */
    .marketing_note {
      background: #f2f3f8; border-radius: 8px; padding: 14px 16px; margin-top: 8px;
    }
    .marketing_note ul { margin: 0; padding-left: 16px; }
    .marketing_note li { font-size: 13px; color: #697387; line-height: 20px; margin-bottom: 4px; }

    /* 하단 버튼 */
    .bottom_btn {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #fff; padding: 12px 20px 32px; border-top: 1px solid #f2f3f8;
    }
    .btn_next {
      width: 100%; height: 52px; background: #1345d1; border: none; border-radius: 8px;
      color: #fff; font-size: 18px; font-weight: 500; cursor: pointer;
      font-family: 'Pretendard', sans-serif;
    }
    .btn_next:disabled { background: #b4bbcb; }
  </style>
</head>
<body>
  <header class="page_header">
    <button class="btn_back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="#141924" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <main>
    <h1 class="page_title">서비스 약관에<br>동의해주세요.</h1>

    <!-- 전체 동의 -->
    <div class="all_agree" onclick="toggleAll()">
      <div class="checkbox_all" id="checkAll">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <span class="all_agree_label">전체 동의</span>
    </div>

    <!-- 항목들 -->
    <div class="terms_list">
      <!-- 필수 1 -->
      <div class="terms_item" onclick="toggleItem(0)">
        <div class="checkbox_item" id="item0">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <span class="terms_label"><span class="terms_badge required">[필수]</span>만 14세 이상입니다.</span>
      </div>
      <!-- 필수 2 -->
      <div class="terms_item" onclick="toggleItem(1)">
        <div class="checkbox_item" id="item1">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <span class="terms_label"><span class="terms_badge required">[필수]</span>이용약관</span>
        <svg class="terms_arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
      <!-- 필수 3 -->
      <div class="terms_item" onclick="toggleItem(2)">
        <div class="checkbox_item" id="item2">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <span class="terms_label"><span class="terms_badge required">[필수]</span>개인정보 수집 및 이용 동의</span>
        <svg class="terms_arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
      <!-- 선택 -->
      <div class="terms_item" onclick="toggleItem(3)">
        <div class="checkbox_item unchecked" id="item3">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <span class="terms_label"><span class="terms_badge">[선택]</span>마케팅 활용 동의</span>
        <svg class="terms_arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
    </div>

    <!-- 마케팅 설명 -->
    <div class="marketing_note">
      <ul>
        <li>이벤트 안내와 경품 수령을 위해 마케팅 동의가 필요합니다.</li>
        <li>마케팅 수신 동의를 철회하려면 설정 &gt; 알림 설정에서 변경하세요.</li>
      </ul>
    </div>
  </main>

  <div class="bottom_btn">
    <button class="btn_next" id="nextBtn">다음</button>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    var checked = [true, true, true, false]; // 초기 상태 (필수 3개 체크됨)

    function renderAll() {
      checked.forEach(function(v, i) {
        var $box = $('#item' + i);
        if (v) {
          $box.addClass('checked').removeClass('unchecked').css('background', '#1345d1');
          $box.find('svg').css('display', 'block');
        } else {
          $box.addClass('unchecked').removeClass('checked').css('background', '').css({'background': '#f2f3f8', 'border': '1.5px solid #d0d3dc'});
          $box.find('svg stroke').css('display', 'none');
        }
      });
      // 전체 동의 체크
      var allChecked = checked.every(function(v) { return v; });
      if (allChecked) {
        $('#checkAll').addClass('checked').css({'background': '#1345d1', 'border_color': '#1345d1'});
      } else {
        $('#checkAll').removeClass('checked').css({'background': '#fff', 'border_color': '#d0d3dc'});
      }
      // 필수 3개 체크 시 버튼 활성화
      var requiredOk = checked[0] && checked[1] && checked[2];
      $('#nextBtn').prop('disabled', !requiredOk);
    }

    function toggleItem(idx) {
      checked[idx] = !checked[idx];
      renderAll();
    }

    function toggleAll() {
      var allChecked = checked.every(function(v) { return v; });
      checked = checked.map(function() { return !allChecked; });
      renderAll();
    }

    renderAll();
  </script>
</body>
</html>
