<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>포트폴리오 제안 - 로딩 중</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /* B형 헤더 */
    .page_header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #E6E9EF;
      display: flex;
      align-items: center;
      padding: 0 8px 0 4px;
      z-index: 100;
    }
    .page_header_back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      cursor: pointer;
      color: #232433;
    }
    .page_header_title {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      color: #232433;
      margin: 0;
    }

    /* 로딩 중앙 레이아웃 */
    .loading_center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px - 56px);
      padding: 40px 32px;
      text-align: center;
    }

    /* 토끼 + 컴퓨터 SVG placeholder */
    .loading_illustration {
      width: 180px;
      height: 160px;
      margin-bottom: 32px;
      position: relative;
    }
    .loading_illustration_inner {
      width: 180px;
      height: 160px;
      background: linear-gradient(135deg, #F0F2FF 0%, #E8ECFF 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
    }

    /* 로딩 텍스트 */
    .loading_text {
      font-size: 18px;
      font-weight: 700;
      color: #232433;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .loading_text em {
      color: #5B5FE4;
      font-style: normal;
    }

    /* 로딩 도트 애니메이션 */
    .loading_dots {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .loading_dot {
      width: 10px;
      height: 10px;
      background: #5B5FE4;
      border-radius: 50%;
      animation: dotBounce 1.2s infinite ease-in-out;
    }
    .loading_dot:nth-child(2) { animation-delay: 0.2s; }
    .loading_dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    /* 서브 텍스트 */
    .loading_sub {
      margin-top: 20px;
      font-size: 14px;
      color: #93959C;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- B형 헤더 (우측 버튼 없음) -->
  <header class="page_header">
    <button class="page_header_back" onclick="history.back()" aria-label="뒤로">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="page_header_title">포트폴리오 제안</h1>
  </header>

  <!-- 로딩 중앙 레이아웃 -->
  <div class="loading_center">
    <div class="loading_illustration">
      <div class="loading_illustration_inner">🐰💻</div>
    </div>

    <p class="loading_text">
      <em>5,000만원</em> 기준으로<br>
      월배당 홀릭 포트를<br>
      만들어 드릴게요.
    </p>

    <div class="loading_dots">
      <div class="loading_dot"></div>
      <div class="loading_dot"></div>
      <div class="loading_dot"></div>
    </div>

    <p class="loading_sub">최적의 포트폴리오를 분석하고 있어요.<br>잠시만 기다려 주세요...</p>
  </div>

  <!-- 하단 네비게이션 -->
  <nav class="bottom_nav" id="bottomNav">
    <div class="bottom_nav_inner">
      <button class="bottom_nav_item" data-nav="home">
        <span class="bottom_nav_icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v11a1 1 0 001 1h4v-6h6v6h4a1 1 0 001-1V9l-8-6z"/></svg>
        </span>
        <span class="bottom_nav_label">홈</span>
      </button>
      <button class="bottom_nav_item" data-nav="etf_search">
        <span class="bottom_nav_icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L20 20" stroke-linecap="round"/></svg>
        </span>
        <span class="bottom_nav_label">ETF검색</span>
      </button>
      <button class="bottom_nav_item" data-nav="etf_compare">
        <span class="bottom_nav_icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="14" width="4" height="7" rx="0.5"/><rect x="10" y="5" width="4" height="16" rx="0.5"/><rect x="17" y="9" width="4" height="12" rx="0.5"/></svg>
        </span>
        <span class="bottom_nav_label">ETF비교</span>
      </button>
      <button class="bottom_nav_item bottom_nav_item_active" data-nav="portrabbit">
        <span class="bottom_nav_icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8 2 6 5 6 8c0 2 1 3.5 2 4.5V15h8v-2.5c1-1 2-2.5 2-4.5 0-3-2-6-6-6z"/><path d="M9 15v4a1 1 0 001 1h4a1 1 0 001-1v-4"/><path d="M6 8C4 8 3 9 3 10s1 2 3 2"/><path d="M18 8c2 0 3 1 3 2s-1 2-3 2"/></svg>
        </span>
        <span class="bottom_nav_label">포트래빗</span>
      </button>
      <button class="bottom_nav_item" data-nav="menu">
        <span class="bottom_nav_icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </span>
        <span class="bottom_nav_label">메뉴</span>
      </button>
    </div>
  </nav>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    $('#bottomNav').on('click', '.bottom-nav__item', function() {
      $('#bottomNav .bottom-nav__item').removeClass('bottom_nav_item_active');
      $(this).addClass('bottom_nav_item_active');
    });
  </script>
</body>
</html>
