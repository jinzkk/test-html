<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 투자 키워드 선택</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root {
      --primary: #1345d1;
      --primary-light: #e8edfc;
    }

    .page-header {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 56px;
      background: #fff;
      border-bottom: 1px solid #E6E9EF;
      display: flex; align-items: center;
      padding: 0 8px 0 4px;
      z-index: 100;
    }
    .page-header__back {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      background: none; border: none; cursor: pointer; color: #232433;
    }
    .page-header__title {
      flex: 1; font-size: 18px; font-weight: 700; color: #232433; margin: 0;
    }
    .page-header__btn {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      background: none; border: none; cursor: pointer; color: #494B55;
    }

    .keyword-area {
      padding: 24px 20px 16px;
    }
    .keyword-area__title {
      font-size: 20px;
      font-weight: 700;
      color: #232433;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    /* 키워드 태그 */
    .keyword-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .keyword-tag {
      height: 38px;
      padding: 0 16px;
      border-radius: 100px;
      border: 1.5px solid #E6E9EF;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      color: #494B55;
      cursor: pointer;
      transition: all 0.15s;
    }
    .keyword-tag--active {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
      font-weight: 700;
    }

    /* 아코디언 */
    .accordion {
      margin: 16px 20px 0;
      border: 1px solid #E6E9EF;
      border-radius: 10px;
      overflow: hidden;
    }
    .accordion__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #F8F9FF;
      cursor: pointer;
      border: none;
      width: 100%;
      text-align: left;
    }
    .accordion__header-text {
      font-size: 13px;
      font-weight: 600;
      color: #494B55;
    }
    .accordion__arrow {
      transition: transform 0.2s;
      color: #93959C;
    }
    .accordion__arrow--open {
      transform: rotate(180deg);
    }
    .accordion__body {
      display: none;
      padding: 14px 16px;
      background: #fff;
    }
    .accordion__body p {
      font-size: 12px;
      color: #71747C;
      line-height: 1.7;
    }

    /* 하단 2버튼 */
    .bottom-action-bar {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      background: #fff;
      border-top: 1px solid #E6E9EF;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }
    .btn-secondary {
      flex: 1;
      height: 52px;
      border: 1.5px solid #E6E9EF;
      border-radius: 8px;
      background: #fff;
      font-size: 15px;
      font-weight: 600;
      color: #494B55;
      cursor: pointer;
    }
    .btn-primary {
      flex: 2;
      height: 52px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }
    .btn-primary:disabled {
      background: #B5B8C0;
      cursor: default;
    }
  </style>
</head>
<body>
  <!-- B형 헤더 -->
  <header class="page-header">
    <button class="page-header__back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1 class="page-header__title">월배당 포트</h1>
    <div>
      <button class="page-header__btn" aria-label="검색">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </header>

  <main style="padding-bottom: 80px;">
    <!-- 키워드 선택 영역 -->
    <div class="keyword-area">
      <h2 class="keyword-area__title">원하시는 투자 키워드를<br>선택하세요</h2>
      <div class="keyword-tags">
        <button class="keyword-tag keyword-tag--active">전체</button>
        <button class="keyword-tag">국내주식</button>
        <button class="keyword-tag">해외주식</button>
        <button class="keyword-tag">채권</button>
        <button class="keyword-tag">통화</button>
        <button class="keyword-tag">자산배분</button>
        <button class="keyword-tag">레버리지/인버스</button>
        <button class="keyword-tag">금리</button>
        <button class="keyword-tag">원자재</button>
        <button class="keyword-tag">부동산</button>
      </div>
    </div>

    <!-- 투자유의문구 아코디언 -->
    <div class="accordion">
      <button class="accordion__header" id="accordionBtn">
        <span class="accordion__header-text">투자유의문구 확인하기</span>
        <svg class="accordion__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="accordion__body" id="accordionBody">
        <p>
          ※ 분배금은 과거 실적이며 미래 분배금을 보장하지 않습니다.<br><br>
          ※ ETF 투자에는 원금 손실이 발생할 수 있으며, 투자 원금은 예금보호 대상이 아닙니다.<br><br>
          ※ 과거 수익률이 미래 수익률을 보장하지 않습니다.<br><br>
          ※ 본 포트폴리오는 투자 참고 정보이며 투자 권유가 아닙니다. 최종 투자 결정은 본인 책임 하에 이루어집니다.
        </p>
      </div>
    </div>
  </main>

  <!-- 하단 2버튼 -->
  <div class="bottom-action-bar">
    <button class="btn-secondary">새로 만들기</button>
    <button class="btn-primary">저장하기</button>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    /* 키워드 태그 선택 */
    $('.keyword-tag').on('click', function() {
      if ($(this).text() === '전체') {
        /* 전체 선택/해제 */
        var isActive = $(this).hasClass('keyword-tag--active');
        $('.keyword-tag').removeClass('keyword-tag--active');
        if (!isActive) $(this).addClass('keyword-tag--active');
      } else {
        /* 전체 태그 해제 */
        $('.keyword-tag:first').removeClass('keyword-tag--active');
        $(this).toggleClass('keyword-tag--active');
        /* 아무것도 선택 안 되면 전체 활성화 */
        if ($('.keyword-tag--active').length === 0) {
          $('.keyword-tag:first').addClass('keyword-tag--active');
        }
      }
    });

    /* 아코디언 */
    $('#accordionBtn').on('click', function() {
      var $body = $('#accordionBody');
      var $arrow = $(this).find('.accordion__arrow');
      if ($body.is(':visible')) {
        $body.slideUp(200);
        $arrow.removeClass('accordion__arrow--open');
      } else {
        $body.slideDown(200);
        $arrow.addClass('accordion__arrow--open');
      }
    });
  </script>
</body>
</html>
