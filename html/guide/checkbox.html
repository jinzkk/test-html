<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox 컴포넌트 가이드</title>
  <link rel="stylesheet" href="../../css/common.css">
</head>
<body>
  <header>
    <h1>Checkbox 컴포넌트 가이드</h1>
  </header>

  <main>
    <!-- Size L -->
    <section class="guide-section">
      <h2 class="guide-section-title">Checkbox - Size L (24px)</h2>
      <div class="guide-row">
        <!-- On -->
        <div class="guide-item">
          <label class="checkbox-wrap">
            <input type="checkbox" class="checkbox-native" checked>
            <span class="checkbox-box checkbox-box--size-l checkbox-box--on"></span>
            <span class="checkbox-text checkbox-text--size-l">On</span>
          </label>
        </div>

        <!-- Indeterminate -->
        <div class="guide-item">
          <label class="checkbox-wrap">
            <input type="checkbox" class="checkbox-native">
            <span class="checkbox-box checkbox-box--size-l checkbox-box--indeterminate"></span>
            <span class="checkbox-text checkbox-text--size-l">Indeterminate</span>
          </label>
        </div>

        <!-- Off -->
        <div class="guide-item">
          <label class="checkbox-wrap">
            <input type="checkbox" class="checkbox-native">
            <span class="checkbox-box checkbox-box--size-l checkbox-box--off"></span>
            <span class="checkbox-text checkbox-text--size-l">Off</span>
          </label>
        </div>

        <!-- On Disabled -->
        <div class="guide-item">
          <label class="checkbox-wrap checkbox-wrap--disabled">
            <input type="checkbox" class="checkbox-native" checked disabled>
            <span class="checkbox-box checkbox-box--size-l checkbox-box--on-disabled"></span>
            <span class="checkbox-text checkbox-text--size-l checkbox-text--disabled">On Disabled</span>
          </label>
        </div>

        <!-- Off Disabled -->
        <div class="guide-item">
          <label class="checkbox-wrap checkbox-wrap--disabled">
            <input type="checkbox" class="checkbox-native" disabled>
            <span class="checkbox-box checkbox-box--size-l checkbox-box--off-disabled"></span>
            <span class="checkbox-text checkbox-text--size-l checkbox-text--disabled">Off Disabled</span>
          </label>
        </div>
      </div>
    </section>

    <!-- Size M -->
    <section class="guide-section">
      <h2 class="guide-section-title">Checkbox - Size M (20px)</h2>
      <div class="guide-row">
        <!-- On -->
        <div class="guide-item">
          <label class="checkbox-wrap">
            <input type="checkbox" class="checkbox-native" checked>
            <span class="checkbox-box checkbox-box--size-m checkbox-box--on"></span>
            <span class="checkbox-text checkbox-text--size-m">On</span>
          </label>
        </div>

        <!-- Indeterminate -->
        <div class="guide-item">
          <label class="checkbox-wrap">
            <input type="checkbox" class="checkbox-native">
            <span class="checkbox-box checkbox-box--size-m checkbox-box--indeterminate"></span>
            <span class="checkbox-text checkbox-text--size-m">Indeterminate</span>
          </label>
        </div>

        <!-- Off -->
        <div class="guide-item">
          <label class="checkbox-wrap">
            <input type="checkbox" class="checkbox-native">
            <span class="checkbox-box checkbox-box--size-m checkbox-box--off"></span>
            <span class="checkbox-text checkbox-text--size-m">Off</span>
          </label>
        </div>

        <!-- On Disabled -->
        <div class="guide-item">
          <label class="checkbox-wrap checkbox-wrap--disabled">
            <input type="checkbox" class="checkbox-native" checked disabled>
            <span class="checkbox-box checkbox-box--size-m checkbox-box--on-disabled"></span>
            <span class="checkbox-text checkbox-text--size-m checkbox-text--disabled">On Disabled</span>
          </label>
        </div>

        <!-- Off Disabled -->
        <div class="guide-item">
          <label class="checkbox-wrap checkbox-wrap--disabled">
            <input type="checkbox" class="checkbox-native" disabled>
            <span class="checkbox-box checkbox-box--size-m checkbox-box--off-disabled"></span>
            <span class="checkbox-text checkbox-text--size-m checkbox-text--disabled">Off Disabled</span>
          </label>
        </div>
      </div>
    </section>

    <!-- Size Sub -->
    <section class="guide-section">
      <h2 class="guide-section-title">Checkbox - Size Sub (20px, 서브)</h2>
      <div class="guide-row">
        <!-- On -->
        <div class="guide-item">
          <label class="checkbox-wrap">
            <input type="checkbox" class="checkbox-native" checked>
            <span class="checkbox-box checkbox-box--size-sub checkbox-box--on"></span>
            <span class="checkbox-text checkbox-text--size-m">On</span>
          </label>
        </div>

        <!-- Indeterminate -->
        <div class="guide-item">
          <label class="checkbox-wrap">
            <input type="checkbox" class="checkbox-native">
            <span class="checkbox-box checkbox-box--size-sub checkbox-box--indeterminate"></span>
            <span class="checkbox-text checkbox-text--size-m">Indeterminate</span>
          </label>
        </div>

        <!-- Off -->
        <div class="guide-item">
          <label class="checkbox-wrap">
            <input type="checkbox" class="checkbox-native">
            <span class="checkbox-box checkbox-box--size-sub checkbox-box--off"></span>
            <span class="checkbox-text checkbox-text--size-m">Off</span>
          </label>
        </div>

        <!-- On Disabled -->
        <div class="guide-item">
          <label class="checkbox-wrap checkbox-wrap--disabled">
            <input type="checkbox" class="checkbox-native" checked disabled>
            <span class="checkbox-box checkbox-box--size-sub checkbox-box--on-disabled"></span>
            <span class="checkbox-text checkbox-text--size-m checkbox-text--disabled">On Disabled</span>
          </label>
        </div>

        <!-- Off Disabled -->
        <div class="guide-item">
          <label class="checkbox-wrap checkbox-wrap--disabled">
            <input type="checkbox" class="checkbox-native" disabled>
            <span class="checkbox-box checkbox-box--size-sub checkbox-box--off-disabled"></span>
            <span class="checkbox-text checkbox-text--size-m checkbox-text--disabled">Off Disabled</span>
          </label>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 HTML5 프로젝트 - Checkbox 컴포넌트 가이드</p>
  </footer>

  <!-- jQuery 로드 -->
  <script src="../../js/lib/jquery-3.7.1.min.js"></script>
  <!-- 공통 JS 로드 -->
  <script src="../../js/common.js"></script>
  <script>
    // 체크박스 클릭 시 상태 클래스 토글 (disabled 제외)
    $(function () {
      $('.checkbox-wrap:not(.checkbox-wrap--disabled)').on('click', function (e) {
        var $box = $(this).find('.checkbox-box');

        // 상태 클래스 순환: off → on → indeterminate → off
        if ($box.hasClass('checkbox-box--off')) {
          $box.removeClass('checkbox-box--off').addClass('checkbox-box--on');
        } else if ($box.hasClass('checkbox-box--on')) {
          $box.removeClass('checkbox-box--on').addClass('checkbox-box--indeterminate');
        } else if ($box.hasClass('checkbox-box--indeterminate')) {
          $box.removeClass('checkbox-box--indeterminate').addClass('checkbox-box--off');
        }
      });
    });
  </script>
</body>
</html>
