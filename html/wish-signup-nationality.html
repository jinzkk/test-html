<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 국적 확인</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root { --primary: #1345d1; }

    body { background: #fff; margin: 0; font-family: 'Pretendard', sans-serif; }

    .page-header {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 56px; background: #fff;
      display: flex; align-items: center; padding: 0 20px; z-index: 100;
    }
    .btn-back {
      width: 24px; height: 24px; background: none; border: none; cursor: pointer; padding: 0;
    }

    main { padding: 56px 20px 20px; }
    .page-title {
      font-size: 24px; font-weight: 700; line-height: 32px;
      color: #141924; margin: 16px 0 32px;
    }

    .input-group { display: flex; flex-direction: column; gap: 24px; }
    .input-wrap { display: flex; flex-direction: column; gap: 8px; }
    .input-label { font-size: 12px; font-weight: 500; color: #141924; line-height: 18px; }
    .input-field {
      width: 100%; padding: 12px 16px; border-radius: 4px;
      font-size: 16px; font-family: 'Pretendard', sans-serif;
      line-height: 24px; outline: none; box-sizing: border-box; background: #fff;
    }
    .input-field--active { border: 1px solid #e5e8ef; color: #b4bbcb; }
    .input-field--filled { border: 1px solid #b4bbcb; color: #141924; font-weight: 500; }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 300;
    }
    .overlay.is-open { display: block; }

    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #fff; border-radius: 27px 27px 0 0; z-index: 400;
      padding: 24px 20px 40px; transform: translateY(100%);
      transition: transform 0.3s ease; box-sizing: border-box;
    }
    .bottom-sheet.is-open { transform: translateY(0); }
    .sheet-title { font-size: 18px; font-weight: 700; color: #1e2124; margin: 0 0 24px; line-height: 24px; }
    .sheet-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; width: 100%; background: none; border: none;
      cursor: pointer; font-size: 18px; font-family: 'Pretendard', sans-serif;
      color: #1e2124; line-height: 24px; text-align: left;
    }
    .sheet-check { display: none; }
    .sheet-check.visible { display: block; }
  </style>
</head>
<body>
  <header class="page-header">
    <button class="btn-back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="#141924" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <main>
    <h1 class="page-title">대한민국 국적을<br>갖고 있나요?</h1>
    <div class="input-group">
      <!-- 현재 입력: 국적 (포커스, 상단) -->
      <div class="input-wrap">
        <div class="input-label">국적</div>
        <button id="nationalityBtn" onclick="openSheet()"
          style="width:100%; padding:12px 16px; border:1px solid #e5e8ef; border-radius:4px;
                 font-size:16px; font-family:Pretendard,sans-serif; color:#b4bbcb;
                 line-height:24px; background:#fff; text-align:left; cursor:pointer; box-sizing:border-box;">
          <span id="nationalityDisplay">국적</span>
        </button>
      </div>
      <!-- 이전 입력된 필드들 -->
      <div class="input-wrap">
        <div class="input-label">성별</div>
        <div class="input-field input-field--filled">남성</div>
      </div>
      <div class="input-wrap">
        <div class="input-label">생년월일</div>
        <div class="input-field input-field--filled">1999년 1월 23일</div>
      </div>
      <div class="input-wrap">
        <div class="input-label">이름</div>
        <div class="input-field input-field--filled">김한투</div>
      </div>
    </div>
  </main>

  <div class="overlay" id="overlay" onclick="closeSheet()"></div>

  <div class="bottom-sheet" id="sheet">
    <p class="sheet-title">대한민국 국적을 갖고 있나요?</p>
    <button class="sheet-option" onclick="selectOption('예')">
      <span>예</span>
      <svg class="sheet-check" id="check-yes" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M5 12L10 17L19 7" stroke="#1345d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="sheet-option" onclick="selectOption('아니요')">
      <span>아니요</span>
      <svg class="sheet-check" id="check-no" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M5 12L10 17L19 7" stroke="#1345d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    function openSheet() {
      $('#overlay').addClass('is-open');
      $('#sheet').addClass('is-open');
    }
    function closeSheet() {
      $('#overlay').removeClass('is-open');
      $('#sheet').removeClass('is-open');
    }
    function selectOption(val) {
      $('.sheet-check').removeClass('visible');
      if (val === '예') $('#check-yes').addClass('visible');
      else $('#check-no').addClass('visible');
      $('#nationalityDisplay').text(val);
      $('#nationalityBtn').css({ 'border-color': '#b4bbcb', 'color': '#141924' });
      setTimeout(closeSheet, 200);
    }
  </script>
</body>
</html>
