<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 포트폴리오 홈</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root {
      --primary: #1345d1;
      --primary-light: #e8edfc;
    }

    /* B형 헤더 */
    .page-header {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 56px;
      background: #fff;
      border-bottom: 1px solid #E6E9EF;
      display: flex;
      align-items: center;
      padding: 0 8px 0 4px;
      z-index: 100;
    }
    .page-header__back {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      background: none; border: none; cursor: pointer; color: #232433;
    }
    .page-header__title {
      flex: 1; font-size: 18px; font-weight: 700; color: #232433; margin: 0;
    }
    .page-header__actions {
      display: flex; gap: 0;
    }
    .page-header__btn {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      background: none; border: none; cursor: pointer; color: #494B55;
    }

    /* 소개 텍스트 */
    .intro-area {
      padding: 24px 20px 20px;
    }
    .intro-area__subtitle {
      font-size: 13px;
      font-weight: 500;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .intro-area__title {
      font-size: 22px;
      font-weight: 800;
      color: #232433;
      line-height: 1.35;
    }
    .intro-area__desc {
      margin-top: 8px;
      font-size: 14px;
      color: #71747C;
      line-height: 1.6;
    }

    /* 포트폴리오 카드 */
    .port-card-list {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .port-card {
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      cursor: pointer;
    }
    .port-card--1 { background: linear-gradient(135deg, #1345d1 0%, #3b6bff 100%); }
    .port-card--2 { background: linear-gradient(135deg, #0d2f6e 0%, #1345d1 100%); }
    .port-card--3 { background: linear-gradient(135deg, #0a1f4e 0%, #0d2f6e 100%); }

    .port-card__illust {
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      width: 60px; height: 60px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .port-card__tag {
      display: inline-flex;
      align-items: center;
      background: rgba(255,255,255,0.2);
      border-radius: 100px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
      width: fit-content;
    }
    .port-card__name {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
    }
    .port-card__desc {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
    }
    .port-card__arrow {
      position: absolute;
      bottom: 20px; right: 20px;
      color: rgba(255,255,255,0.7);
    }

    /* 더보기 버튼 */
    .more-btn-wrap {
      padding: 16px 20px 24px;
    }
    .more-btn {
      width: 100%;
      height: 48px;
      border: 1.5px solid var(--primary);
      border-radius: 8px;
      background: #fff;
      color: var(--primary);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* 하단 탭바 */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 56px;
      background: #fff;
      border-top: 1px solid #E6E9EF;
      display: flex;
      z-index: 100;
    }
    .bottom-nav__item {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      background: none; border: none; cursor: pointer;
      color: #B5B8C0;
      font-size: 10px; font-weight: 500;
    }
    .bottom-nav__item--active { color: var(--primary); }
    .bottom-nav__icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <!-- B형 헤더 -->
  <header class="page-header">
    <button class="page-header__back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1 class="page-header__title">포트폴리오</h1>
    <div class="page-header__actions">
      <button class="page-header__btn" aria-label="검색">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <!-- 소개 텍스트 -->
    <div class="intro-area">
      <p class="intro-area__subtitle">AI 추천 포트폴리오</p>
      <h2 class="intro-area__title">한투온이 포트폴리오를<br>만들어 드려요</h2>
      <p class="intro-area__desc">나의 투자 성향에 맞는 ETF 포트폴리오를<br>간편하게 구성해 드립니다.</p>
    </div>

    <!-- 포트폴리오 카드 -->
    <div class="port-card-list">
      <!-- 월배당 포트 -->
      <div class="port-card port-card--1">
        <div class="port-card__illust">📅</div>
        <div class="port-card__tag">매월 입금</div>
        <div class="port-card__name">월배당 포트</div>
        <div class="port-card__desc">매월 배당금이 들어오는 포트폴리오</div>
      </div>
      <!-- 연금/ISA 포트 -->
      <div class="port-card port-card--2">
        <div class="port-card__illust">📊</div>
        <div class="port-card__tag">연금/ISA계좌</div>
        <div class="port-card__name">연금/ISA 포트</div>
        <div class="port-card__desc">절세 계좌에 최적화된 포트폴리오</div>
      </div>
      <!-- 증여 솔루션 -->
      <div class="port-card port-card--3">
        <div class="port-card__illust">📈</div>
        <div class="port-card__tag">비과세 증여</div>
        <div class="port-card__name">증여 솔루션</div>
        <div class="port-card__desc">자녀에게 ETF로 증여하는 솔루션</div>
      </div>
    </div>

    <!-- 더보기 -->
    <div class="more-btn-wrap">
      <button class="more-btn">더보기</button>
    </div>
  </main>

  <!-- 하단 탭바 -->
  <nav class="bottom-nav">
    <button class="bottom-nav__item">
      <span class="bottom-nav__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </span>
      홈
    </button>
    <button class="bottom-nav__item">
      <span class="bottom-nav__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      검색
    </button>
    <button class="bottom-nav__item bottom-nav__item--active">
      <span class="bottom-nav__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </span>
      포트폴리오
    </button>
    <button class="bottom-nav__item">
      <span class="bottom-nav__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
      </span>
      ETF
    </button>
    <button class="bottom-nav__item">
      <span class="bottom-nav__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      MY
    </button>
  </nav>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
</body>
</html>
