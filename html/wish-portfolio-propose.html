<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 포트폴리오 제안 생성 중</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root { --primary: #1345d1; }
    * { box-sizing: border-box; }
    body { background: #fff; margin: 0; font-family: 'Pretendard', sans-serif; }

    .page_header {
      position: fixed; top: 0; left: 0; width: 100%; height: 56px; background: #fff;
      display: flex; align-items: center; gap: 8px; padding: 0 20px; z-index: 100;
      border-bottom: 1px solid #f2f3f8;
    }
    .btn_back { background: none; border: none; cursor: pointer; padding: 0; }
    .header_title { flex: 1; font-size: 18px; font-weight: 700; color: #141924; }

    main { padding: 56px 20px 100px; min-height: 100vh; display: flex; flex-direction: column; }

    /* 중앙 콘텐츠 */
    .center_content {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 0;
    }

    /* 파이차트 3D 일러스트 */
    .pie_illustration {
      width: 200px; height: 200px; margin: 0 auto 32px;
      position: relative;
    }
    /* CSS로 3D 파이차트 느낌 구현 */
    .pie_chart {
      width: 160px; height: 80px; border-radius: 50%;
      background: conic-gradient(
        #1345d1 0deg 120deg,
        #227af1 120deg 200deg,
        #7c6ffb 200deg 280deg,
        #09b5f5 280deg 360deg
      );
      transform: rotateX(55deg) scale(1);
      box-shadow: 0 30px 0 -2px rgba(19,69,209,0.3),
                  0 25px 0 -1px rgba(34,122,241,0.3);
      margin: 40px auto 0;
    }
    /* 파이차트 조각들 (중첩) */
    .pie_segment {
      position: absolute; width: 0; height: 0;
      border-left: 80px solid transparent;
      border-right: 80px solid transparent;
    }

    /* 텍스트 */
    .propose_text { text-align: center; }
    .propose_text_main {
      font-size: 22px; font-weight: 700; color: #141924;
      line-height: 1.5; margin-bottom: 16px;
    }
    .propose_text_main em { color: #1345d1; font-style: normal; }
    .propose_text_sub { font-size: 14px; color: #697387; }

    /* 하단 탭바 (pill) */
    .bottom_nav {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: #fff; border-radius: 50px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      display: flex; padding: 8px 16px; z-index: 200;
    }
    .nav_item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 14px; cursor: pointer; min-width: 56px;
    }
    .nav_item_icon { width: 22px; height: 22px; color: #b4bbcb; }
    .nav_item_icon.active { color: #1345d1; }
    .nav_item_label { font-size: 10px; color: #b4bbcb; font-weight: 500; }
    .nav_item_label.active { color: #1345d1; }
  </style>
</head>
<body>
  <header class="page_header">
    <button class="btn_back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="#141924" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="header_title">포트폴리오 제안</span>
  </header>

  <main>
    <div class="center_content">
      <!-- 파이차트 3D 일러스트 -->
      <div class="pie_illustration">
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none">
          <!-- 3D 파이차트 효과 -->
          <!-- 사이드 그림자 -->
          <ellipse cx="100" cy="140" rx="70" ry="18" fill="rgba(19,69,209,0.15)"/>
          <!-- 3D 측면들 -->
          <path d="M30 120 Q30 140 100 140 Q170 140 170 120 L170 125 Q170 145 100 145 Q30 145 30 125 Z" fill="#0a30a8"/>
          <!-- 파이 상단 -->
          <ellipse cx="100" cy="120" rx="70" ry="25" fill="#1345d1"/>
          <!-- 조각 1 (파란색) -->
          <path d="M100 120 L100 95 A70 25 0 0 1 160 108 Z" fill="#227af1"/>
          <!-- 조각 2 (보라) -->
          <path d="M100 120 L160 108 A70 25 0 0 1 130 140 Z" fill="#7c6ffb"/>
          <!-- 조각 3 (하늘) -->
          <path d="M100 120 L130 140 A70 25 0 0 1 40 135 Z" fill="#09b5f5"/>
          <!-- 중앙 밝기 -->
          <ellipse cx="100" cy="118" rx="30" ry="10" fill="rgba(255,255,255,0.15)"/>
          <!-- 위 레이어 파이 -->
          <ellipse cx="100" cy="100" rx="70" ry="25" fill="#1345d1"/>
          <path d="M100 100 L100 75 A70 25 0 0 1 160 88 Z" fill="#227af1"/>
          <path d="M100 100 L160 88 A70 25 0 0 1 70 122 Z" fill="#7c6ffb"/>
          <path d="M100 100 L70 122 A70 25 0 0 1 100 75 Z" fill="#09b5f5"/>
          <ellipse cx="100" cy="98" rx="28" ry="9" fill="rgba(255,255,255,0.12)"/>
        </svg>
      </div>

      <div class="propose_text">
        <div class="propose_text_main">
          <em>5,000만원</em> 기준으로<br>
          월배당 홀릭 포트를<br>
          만들어 드릴게요.
        </div>
        <div class="propose_text_sub">잠시만 기다려 주세요...</div>
      </div>
    </div>
  </main>

  <nav class="bottom_nav">
    <div class="nav_item">
      <svg class="nav_item_icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="nav_item_label">ETF상품</span>
    </div>
    <div class="nav_item">
      <svg class="nav_item_icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <span class="nav_item_label">투자정보</span>
    </div>
    <div class="nav_item">
      <svg class="nav_item_icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      </svg>
      <span class="nav_item_label">홈</span>
    </div>
    <div class="nav_item">
      <svg class="nav_item_icon active" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="10"/>
      </svg>
      <span class="nav_item_label active">포트폴리오</span>
    </div>
    <div class="nav_item">
      <svg class="nav_item_icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <span class="nav_item_label">메뉴</span>
    </div>
  </nav>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
</body>
</html>
