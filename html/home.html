<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FunETF 홈</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <script src="../js/lib/echarts-5.6.1.min.js"></script>
  <style>
    /* 스탠다드 회원 배너 */
    .member_banner {
      background: linear-gradient(90deg, #1BC9A0 0%, #0BA87D 100%);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .member_banner_left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .member_banner_badge {
      background: rgba(255,255,255,0.25);
      border-radius: 100px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }
    .member_banner_text {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
    }
    .member_banner_arrow {
      color: rgba(255,255,255,0.8);
    }

    /* My List 탭 */
    .my_list_tab {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid #E6E9EF;
      padding: 0 20px;
      gap: 0;
    }
    .my_list_tab::-webkit-scrollbar { display: none; }
    .my_list_tab_item {
      position: relative;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 500;
      color: #93959C;
      background: none;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .my_list_tab_item_active {
      color: #232433;
      font-weight: 700;
    }
    .my_list_tab_item_active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #232433;
      border-radius: 1px;
    }

    /* 빈 상태 */
    .empty_state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 12px;
    }
    .empty_state_icon {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .empty_state_text {
      font-size: 15px;
      font-weight: 500;
      color: #93959C;
      text-align: center;
      line-height: 1.5;
    }
    .empty_state_btn {
      margin-top: 8px;
      height: 44px;
      padding: 0 24px;
      background: #5B5FE4;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* 포트래빗 예고 영역 */
    .portrabbit_teaser {
      background: linear-gradient(135deg, #5B5FE4 0%, #8B8EF5 100%);
      margin: 0 20px 24px;
      border-radius: 12px;
      padding: 20px;
      overflow: hidden;
    }
    .portrabbit_teaser_label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      margin-bottom: 6px;
    }
    .portrabbit_teaser_title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      line-height: 1.4;
    }

    /* 인덱스 카드 영역 */
    .index_scroll_area {
      padding: 20px 20px 8px;
    }
  </style>
</head>
<body>

  <!-- 모바일 헤더 (A형 - 로고) -->
  <header class="mo_header">
    <div class="mo_header_logo">FUNETF</div>
    <div class="mo_header_actions">
      <button class="mo_header_btn" aria-label="알림">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M18 8A6 6 0 106 8c0 7-3 9-3 9h18s-3-2-3-9z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="mo_header_btn" aria-label="찜">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="mo_header_btn" aria-label="검색">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M16.5 16.5L20 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- 스탠다드 회원 배너 -->
  <div class="member_banner">
    <div class="member_banner_left">
      <span class="member_banner_badge">스탠다드 회원</span>
      <span class="member_banner_text">멤버십 혜택을 확인해 보세요</span>
    </div>
    <span class="member_banner_arrow">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M9 6L15 12L9 18" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  </div>

  <!-- 지수 카드 (가로 스크롤) -->
  <div class="index_scroll_area">
    <div class="futures_scroll">
      <div class="futures_card">
        <div class="futures_card_name">S&amp;P500 선물</div>
        <div class="futures_card_price">5,253.50</div>
        <div class="futures_card_change color_rise">
          <span class="icon_arrow_up"></span>0.25 (0.00%)
        </div>
        <div class="futures_card_chart" id="homeSparkline0"></div>
      </div>
      <div class="futures_card">
        <div class="futures_card_name">나스닥100 선물</div>
        <div class="futures_card_price">18,306.25</div>
        <div class="futures_card_change color_rise">
          <span class="icon_arrow_up"></span>25.00 (0.15%)
        </div>
        <div class="futures_card_chart" id="homeSparkline1"></div>
      </div>
      <div class="futures_card">
        <div class="futures_card_name">러셀2000 선물</div>
        <div class="futures_card_price">2,018.75</div>
        <div class="futures_card_change color_rise">
          <span class="icon_arrow_up"></span>11.25 (0.06%)
        </div>
        <div class="futures_card_chart" id="homeSparkline2"></div>
      </div>
      <div class="futures_card">
        <div class="futures_card_name">다우 선물</div>
        <div class="futures_card_price">39,185.00</div>
        <div class="futures_card_change color_fall">
          <span class="icon_arrow_down"></span>34.00 (-0.09%)
        </div>
        <div class="futures_card_chart" id="homeSparkline3"></div>
      </div>
    </div>
  </div>

  <!-- 검색박스 -->
  <div style="padding: 0 20px 20px;">
    <div class="search_box">
      <div class="search_box_inner">
        <span class="search_box_placeholder">상품명과 코드로 검색해 보세요!</span>
        <span class="search_box_icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="#4B4FD4" stroke-width="2"/>
            <path d="M16.5 16.5L20 20" stroke="#4B4FD4" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
      </div>
    </div>
  </div>

  <!-- My List 섹션 -->
  <section class="my_list_section">
    <div class="section_header">
      <h2 class="section_title">My List</h2>
      <button class="btn_setting">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 13a3 3 0 100-6 3 3 0 000 6z" stroke="#494B55" stroke-width="1.5"/>
          <path d="M16.47 12.12A1.29 1.29 0 0016.82 13.49l-.46.8a1.29 1.29 0 01-1.57.53l-.2-.08a1.29 1.29 0 00-1.39.28 1.29 1.29 0 00-.38.91v.18A1.29 1.29 0 0111.53 17h-.92a1.29 1.29 0 01-1.29-1.29v-.1a1.29 1.29 0 00-.85-1.18 1.29 1.29 0 00-1.39.28l-.07.07a1.29 1.29 0 01-1.82 0 1.29 1.29 0 01-.17-.17l-.46-.8a1.29 1.29 0 01.35-1.63l.06-.05a1.29 1.29 0 000-2.24l-.06-.05a1.29 1.29 0 01-.35-1.63l.46-.8a1.29 1.29 0 011.57-.53l.2.08a1.29 1.29 0 001.39-.28c.25-.25.38-.58.38-.91v-.18A1.29 1.29 0 018.61 3h.92c.71 0 1.29.58 1.29 1.29v.1c0 .34.13.67.38.91a1.29 1.29 0 001.39.28l.2-.08a1.29 1.29 0 011.57.53l.46.8a1.29 1.29 0 01-.35 1.63l-.06.05a1.29 1.29 0 000 2.24l.06.05z" stroke="#494B55" stroke-width="1.2"/>
        </svg>
        설정
      </button>
    </div>

    <!-- 탭 -->
    <div class="my_list_tab" id="myListTab">
      <button class="my_list_tab_item my_list_tab_item_active" data-tab="interest">관심상품</button>
      <button class="my_list_tab_item" data-tab="recent_etf">최근 본 ETF</button>
      <button class="my_list_tab_item" data-tab="recent_fund">최근 본 펀드</button>
      <button class="my_list_tab_item" data-tab="default">기본그룹</button>
    </div>

    <!-- 빈 상태 (관심상품 탭) -->
    <div class="empty_state" id="emptyState">
      <div class="empty_state_icon">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 차트 아이콘 -->
          <rect x="8" y="20" width="56" height="36" rx="4" fill="#F0F2F8"/>
          <path d="M16 44 L26 32 L34 38 L44 26 L56 30" stroke="#B4B6BC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <!-- 하트 오버레이 -->
          <circle cx="52" cy="20" r="12" fill="#fff" stroke="#E6E9EF" stroke-width="1"/>
          <path d="M52 24.5l-4.5-4.3a2.5 2.5 0 013.5-3.5l1 1 1-1a2.5 2.5 0 013.5 3.5L52 24.5z" fill="#F14E4E"/>
        </svg>
      </div>
      <p class="empty_state_text">아직 등록된 관심상품이 없어요.<br>관심있는 상품을 추가해 보세요!</p>
      <button class="empty_state_btn">관심상품 등록하기</button>
    </div>
  </section>

  <div class="divider"></div>

  <!-- 포트래빗 예고 영역 -->
  <div style="padding: 20px 0 8px;">
    <div class="portrabbit_teaser">
      <div class="portrabbit_teaser_label">포트래빗</div>
      <div class="portrabbit_teaser_title">포트래빗 기대치는 그애이<br>포트폴리오를 만들어 드려요!</div>
      <div style="margin-top: 12px;">
        <button style="background: rgba(255,255,255,0.2); color:#fff; border: 1px solid rgba(255,255,255,0.4); border-radius: 100px; padding: 6px 16px; font-size: 13px; cursor: pointer;">
          포트래빗 시작하기 →
        </button>
      </div>
    </div>
  </div>

  <!-- 하단 네비게이션 -->
  <nav class="bottom_nav" id="bottomNav">
    <div class="bottom_nav_inner">
      <button class="bottom_nav_item bottom_nav_item_active" data-nav="home">
        <span class="bottom_nav_icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v11a1 1 0 001 1h4v-6h6v6h4a1 1 0 001-1V9l-8-6z"/></svg>
        </span>
        <span class="bottom_nav_label">홈</span>
      </button>
      <button class="bottom_nav_item" data-nav="etf_search">
        <span class="bottom_nav_icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L20 20" stroke-linecap="round"/></svg>
        </span>
        <span class="bottom_nav_label">ETF검색</span>
      </button>
      <button class="bottom_nav_item" data-nav="etf_compare">
        <span class="bottom_nav_icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="14" width="4" height="7" rx="0.5"/><rect x="10" y="5" width="4" height="16" rx="0.5"/><rect x="17" y="9" width="4" height="12" rx="0.5"/></svg>
        </span>
        <span class="bottom_nav_label">ETF비교</span>
      </button>
      <button class="bottom_nav_item" data-nav="portrabbit">
        <span class="bottom_nav_icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8 2 6 5 6 8c0 2 1 3.5 2 4.5V15h8v-2.5c1-1 2-2.5 2-4.5 0-3-2-6-6-6z"/><path d="M9 15v4a1 1 0 001 1h4a1 1 0 001-1v-4"/><path d="M6 8C4 8 3 9 3 10s1 2 3 2"/><path d="M18 8c2 0 3 1 3 2s-1 2-3 2"/></svg>
        </span>
        <span class="bottom_nav_label">포트래빗</span>
      </button>
      <button class="bottom_nav_item" data-nav="menu">
        <span class="bottom_nav_icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </span>
        <span class="bottom_nav_label">메뉴</span>
      </button>
    </div>
  </nav>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    /* 스파크라인 데이터 생성 */
    function genSparkData(isRise) {
      var base = 100;
      var data = [];
      for (var i = 0; i < 20; i++) {
        var change = (Math.random() - (isRise ? 0.4 : 0.6)) * 5;
        base += change;
        data.push(Math.round(base * 100) / 100);
      }
      return data;
    }

    /* 스파크라인 차트 초기화 */
    function initSparkline(domId, isRise) {
      var dom = document.getElementById(domId);
      if (!dom) return null;
      var chart = echarts.init(dom);
      var color = isRise ? '#F14E4E' : '#336AFF';
      var areaColor = isRise ? 'rgba(241,78,78,0.1)' : 'rgba(51,106,255,0.1)';
      chart.setOption({
        grid: { left: 0, right: 0, top: 2, bottom: 2 },
        xAxis: { type: 'category', show: false },
        yAxis: { type: 'value', show: false },
        series: [{
          type: 'line',
          data: genSparkData(isRise),
          smooth: true,
          symbol: 'none',
          lineStyle: { color: color, width: 1.5 },
          areaStyle: {
            color: {
              type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
              colorStops: [
                { offset: 0, color: areaColor },
                { offset: 1, color: 'rgba(255,255,255,0)' }
              ]
            }
          }
        }]
      });
      return chart;
    }

    var allCharts = [];
    var rises = [true, true, true, false];
    for (var i = 0; i < 4; i++) {
      var c = initSparkline('homeSparkline' + i, rises[i]);
      if (c) allCharts.push(c);
    }

    window.addEventListener('resize', function() {
      allCharts.forEach(function(chart) { chart.resize(); });
    });

    /* 탭 전환 */
    $('#myListTab').on('click', '.my-list-tab__item', function() {
      $('#myListTab .my-list-tab__item').removeClass('my_list_tab_item_active');
      $(this).addClass('my_list_tab_item_active');
    });

    /* 하단 네비 */
    $('#bottomNav').on('click', '.bottom-nav__item', function() {
      $('#bottomNav .bottom-nav__item').removeClass('bottom_nav_item_active');
      $(this).addClass('bottom_nav_item_active');
    });
  </script>
</body>
</html>
