<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 통신사 선택</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root { --primary: #1345d1; }

    body { background: #fff; margin: 0; font-family: 'Pretendard', sans-serif; }

    .page_header {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 56px; background: #fff;
      display: flex; align-items: center; padding: 0 20px; z-index: 100;
    }
    .btn_back { width: 24px; height: 24px; background: none; border: none; cursor: pointer; padding: 0; }

    main { padding: 56px 20px 20px; }
    .page_title { font-size: 24px; font-weight: 700; line-height: 32px; color: #141924; margin: 16px 0 32px; }

    .input_group { display: flex; flex-direction: column; gap: 24px; }
    .input_wrap { display: flex; flex-direction: column; gap: 8px; }
    .input_label { font-size: 12px; font-weight: 500; color: #141924; line-height: 18px; }
    .input_field {
      width: 100%; padding: 12px 16px; border-radius: 4px;
      font-size: 16px; font-family: 'Pretendard', sans-serif;
      line-height: 24px; outline: none; box-sizing: border-box; background: #fff;
    }
    .input_field_active { border: 1px solid #e5e8ef; color: #b4bbcb; }
    .input_field_filled { border: 1px solid #b4bbcb; color: #141924; font-weight: 500; }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 300;
    }
    .overlay.is_open { display: block; }

    .bottom_sheet {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #fff; border-radius: 27px 27px 0 0; z-index: 400;
      padding: 24px 20px 40px; transform: translateY(100%);
      transition: transform 0.3s ease; box-sizing: border-box;
    }
    .bottom_sheet.is_open { transform: translateY(0); }
    .sheet_title { font-size: 18px; font-weight: 700; color: #1e2124; margin: 0 0 24px; line-height: 24px; }
    .sheet_option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; width: 100%; background: none; border: none;
      cursor: pointer; font-size: 18px; font-family: 'Pretendard', sans-serif;
      color: #1e2124; line-height: 24px; text-align: left;
    }
    .sheet_check { display: none; }
    .sheet_check.visible { display: block; }
  </style>
</head>
<body>
  <header class="page_header">
    <button class="btn_back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="#141924" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <main>
    <h1 class="page_title">사용 쓰는 휴대폰은<br>통신사가 어디인가요?</h1>
    <div class="input_group">
      <!-- 현재 입력: 통신사 (포커스, 상단) -->
      <div class="input_wrap">
        <div class="input_label">통신사</div>
        <button id="carrierBtn" onclick="openSheet()"
          style="width:100%; padding:12px 16px; border:1px solid #e5e8ef; border-radius:4px;
                 font-size:16px; font-family:Pretendard,sans-serif; color:#b4bbcb;
                 line-height:24px; background:#fff; text-align:left; cursor:pointer; box-sizing:border-box;">
          <span id="carrierDisplay">통신사</span>
        </button>
      </div>
      <!-- 이전 입력된 필드들 -->
      <div class="input_wrap">
        <div class="input_label">국적</div>
        <div class="input_field input_field_filled">대한민국</div>
      </div>
      <div class="input_wrap">
        <div class="input_label">성별</div>
        <div class="input_field input_field_filled">남성</div>
      </div>
      <div class="input_wrap">
        <div class="input_label">생년월일</div>
        <div class="input_field input_field_filled">1999년 1월 23일</div>
      </div>
      <div class="input_wrap">
        <div class="input_label">이름</div>
        <div class="input_field input_field_filled">김한투</div>
      </div>
    </div>
  </main>

  <div class="overlay" id="overlay" onclick="closeSheet()"></div>

  <div class="bottom_sheet" id="sheet">
    <p class="sheet_title">통신사를 선택해주세요</p>
    <button class="sheet_option" onclick="selectCarrier('SKT')">
      <span>SKT</span>
      <svg class="sheet_check" id="check_SKT" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M5 12L10 17L19 7" stroke="#1345d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="sheet_option" onclick="selectCarrier('KT')">
      <span>KT</span>
      <svg class="sheet_check" id="check_KT" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M5 12L10 17L19 7" stroke="#1345d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="sheet_option" onclick="selectCarrier('LGU+')">
      <span>LGU+</span>
      <svg class="sheet_check" id="check_LGU" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M5 12L10 17L19 7" stroke="#1345d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="sheet_option" onclick="selectCarrier('SKT 알뜰폰')">
      <span>SKT 알뜰폰</span>
      <svg class="sheet_check" id="check_SKT_mvno" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M5 12L10 17L19 7" stroke="#1345d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="sheet_option" onclick="selectCarrier('KT 알뜰폰')">
      <span>KT 알뜰폰</span>
      <svg class="sheet_check" id="check_KT_mvno" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M5 12L10 17L19 7" stroke="#1345d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="sheet_option" onclick="selectCarrier('LGU+ 알뜰폰')">
      <span>LGU+ 알뜰폰</span>
      <svg class="sheet_check" id="check_LGU_mvno" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M5 12L10 17L19 7" stroke="#1345d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    function openSheet() {
      $('#overlay').addClass('is_open');
      $('#sheet').addClass('is_open');
    }
    function closeSheet() {
      $('#overlay').removeClass('is_open');
      $('#sheet').removeClass('is_open');
    }
    function selectCarrier(val) {
      $('.sheet-check').removeClass('visible');
      var idMap = {
        'SKT': 'check_SKT', 'KT': 'check_KT', 'LGU+': 'check_LGU',
        'SKT 알뜰폰': 'check_SKT_mvno', 'KT 알뜰폰': 'check_KT_mvno', 'LGU+ 알뜰폰': 'check_LGU_mvno'
      };
      $('#' + idMap[val]).addClass('visible');
      $('#carrierDisplay').text(val);
      $('#carrierBtn').css({ 'border_color': '#b4bbcb', 'color': '#141924' });
      setTimeout(closeSheet, 200);
    }
  </script>
</body>
</html>
