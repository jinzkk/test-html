<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>회원가입 03. 정보입력</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /* B형 헤더 */
    .page_header {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 56px;
      background: #fff;
      border-bottom: 1px solid #E6E9EF;
      display: flex; align-items: center;
      padding: 0 8px 0 4px;
      z-index: 100;
    }
    .page_header_back {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      background: none; border: none; cursor: pointer; color: #232433;
    }
    .page_header_title {
      flex: 1; font-size: 18px; font-weight: 700; color: #232433; margin: 0;
    }

    /* 스텝 인디케이터 */
    .step_indicator {
      display: flex; align-items: center;
      padding: 20px 20px 0; margin-bottom: 28px;
    }
    .step_item {
      display: flex; flex-direction: column; align-items: center;
    }
    .step_item_circle {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #F0F2F6;
      border: 1.5px solid #D4D8E2;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #93959C;
    }
    .step_item_circle_done {
      background: #0055FF; border-color: #0055FF; color: #fff;
    }
    .step_item_circle_active {
      background: #fff; border-color: #0055FF; color: #0055FF;
    }
    .step_item_label {
      font-size: 11px; font-weight: 500; color: #93959C;
      margin-top: 4px; white-space: nowrap;
    }
    .step_item_label_active {
      color: #0055FF; font-weight: 700;
      text-decoration: underline; text-underline-offset: 3px;
    }
    .step_connector {
      height: 1.5px; background: #D4D8E2;
      flex: 1; margin-bottom: 20px;
    }
    .step_connector_done { background: #0055FF; }

    /* 콘텐츠 */
    .page_content { padding: 0 20px; }
    .page_title {
      font-size: 22px; font-weight: 700; color: #232433;
      line-height: 1.4; margin-bottom: 28px;
    }

    /* 폼 그룹 */
    .form_group { margin-bottom: 20px; }
    .form_label {
      display: flex; align-items: center; gap: 3px;
      font-size: 13px; font-weight: 600; color: #494B55;
      margin-bottom: 7px;
    }
    .form_label_required { color: #FF4444; font-size: 14px; }
    .form_input_wrap {
      display: flex; align-items: center;
      border: 1.5px solid #D4D8E2;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .form_input_wrap:focus-within { border-color: #0055FF; }
    .form_input {
      flex: 1; height: 52px;
      border: none; outline: none;
      padding: 0 16px;
      font-size: 16px; color: #232433;
      background: transparent;
    }
    .form_input::placeholder { color: #B4B6BC; }
    .form_input_suffix {
      padding: 0 14px 0 0;
      font-size: 14px; color: #5B5FE4; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .form_hint {
      margin-top: 5px;
      font-size: 12px; color: #93959C; line-height: 1.5;
    }

    /* 비밀번호 점 표시 */
    .pw_dots {
      display: flex; align-items: center; gap: 6px;
      padding: 0 16px; height: 52px;
    }
    .pw_dot {
      width: 10px; height: 10px;
      border-radius: 50%; background: #232433;
    }

    /* 확인 버튼 (비활성) */
    .bottom_fixed_btn {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px 20px;
      background: #fff;
      border-top: 1px solid #F0F2F6;
    }
    .confirm_btn {
      width: 100%; height: 56px;
      background: #E5E8EF; color: #fff;
      border: none; border-radius: 12px;
      font-size: 17px; font-weight: 700;
      cursor: not-allowed;
    }
    .confirm_btn_active {
      background: #0055FF; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- B형 헤더 -->
  <header class="page_header">
    <button class="page_header_back" onclick="history.back()" aria-label="뒤로">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="page_header_title">회원가입</h1>
  </header>

  <!-- 스텝 인디케이터 -->
  <div class="step_indicator">
    <div class="step_item">
      <div class="step_item_circle step_item_circle_done">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step_item_label">유형 선택</div>
    </div>
    <div class="step_connector step_connector_done"></div>
    <div class="step_item">
      <div class="step_item_circle step_item_circle_done">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step_item_label">약관 동의</div>
    </div>
    <div class="step_connector step_connector_done"></div>
    <div class="step_item">
      <div class="step_item_circle step_item_circle_active">3</div>
      <div class="step_item_label step_item_label_active">정보입력</div>
    </div>
    <div class="step_connector"></div>
    <div class="step_item">
      <div class="step_item_circle">4</div>
      <div class="step_item_label">완료</div>
    </div>
  </div>

  <!-- 콘텐츠 -->
  <div class="page_content">
    <h2 class="page_title">가입 정보를 입력해주세요.</h2>

    <!-- 휴대폰 번호 -->
    <div class="form_group">
      <div class="form_label">
        휴대폰 번호<span class="form_label_required">*</span>
      </div>
      <div class="form_input_wrap">
        <input type="tel" class="form_input" placeholder="숫자만 입력해 주세요" id="phoneInput" maxlength="11">
        <span class="form_input_suffix">인증요청</span>
      </div>
    </div>

    <!-- 이름 -->
    <div class="form_group">
      <div class="form_label">
        이름<span class="form_label_required">*</span>
      </div>
      <div class="form_input_wrap">
        <input type="text" class="form_input" value="서효석" id="nameInput">
      </div>
    </div>

    <!-- 비밀번호 확인 -->
    <div class="form_group">
      <div class="form_label">
        비밀번호 확인<span class="form_label_required">*</span>
      </div>
      <div class="form_input_wrap">
        <div class="pw_dots">
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
        </div>
      </div>
    </div>

    <!-- 비밀번호 -->
    <div class="form_group">
      <div class="form_label">
        비밀번호<span class="form_label_required">*</span>
      </div>
      <div class="form_input_wrap">
        <div class="pw_dots">
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
          <div class="pw_dot"></div>
        </div>
      </div>
      <div class="form_hint">영문, 숫자, 특수문자 포함 8자 이상</div>
    </div>

    <!-- 이메일 (스크롤 밖으로 나감 암시) -->
    <div class="form_group">
      <div class="form_label">
        이메일<span class="form_label_required">*</span>
      </div>
      <div class="form_input_wrap">
        <input type="email" class="form_input" placeholder="이메일 주소를 입력해 주세요" id="emailInput">
      </div>
    </div>

    <!-- 여백 (하단 버튼 공간) -->
    <div style="height: 80px;"></div>
  </div>

  <!-- 하단 고정 버튼 (비활성) -->
  <div class="bottom_fixed_btn">
    <button class="confirm_btn" id="confirmBtn">확인</button>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    /* 입력값 검사 → 버튼 활성화 */
    function checkForm() {
      var phone = $('#phoneInput').val().replace(/\D/g, '');
      var email = $('#emailInput').val();
      /* 간단 검사: 전화번호 10자 이상, 이메일에 @ 포함 */
      if (phone.length >= 10 && email.indexOf('@') > -1) {
        $('#confirmBtn').addClass('confirm_btn_active').prop('disabled', false);
      } else {
        $('#confirmBtn').removeClass('confirm_btn_active').prop('disabled', true);
      }
    }
    $('#phoneInput, #emailInput').on('input', checkForm);
  </script>
</body>
</html>
