<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 포트폴리오 제안 결과</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root { --primary: #1345d1; }
    * { box-sizing: border-box; }
    body { background: #fff; margin: 0; font-family: 'Pretendard', sans-serif; }

    .page_header {
      position: fixed; top: 0; left: 0; width: 100%; height: 56px; background: #fff;
      display: flex; align-items: center; gap: 8px; padding: 0 20px; z-index: 100;
      border-bottom: 1px solid #f2f3f8;
    }
    .btn_back { background: none; border: none; cursor: pointer; padding: 0; }
    .header_title { flex: 1; font-size: 18px; font-weight: 700; color: #141924; }
    .icon_btn { background: none; border: none; cursor: pointer; padding: 4px; }

    main { padding: 56px 20px 100px; }

    /* 태그 */
    .result_tag {
      display: inline-block; background: #ebfcff; color: #009aff;
      font-size: 13px; font-weight: 600; padding: 5px 12px; border-radius: 20px;
      margin: 16px 0 20px;
    }

    /* 기간/금액 선택 */
    .selector_text { font-size: 16px; color: #141924; line-height: 1.6; margin-bottom: 4px; }
    .selector_inline {
      display: inline-flex; align-items: center; gap: 4px;
      background: #f2f3f8; border-radius: 6px; padding: 3px 8px;
      cursor: pointer; font-size: 16px; font-weight: 600; color: #141924;
    }
    .selector_inline svg { width: 14px; height: 14px; }

    /* 결과 금액 */
    .result_amount {
      font-size: 22px; font-weight: 800; color: #141924; margin: 16px 0 24px; line-height: 1.4;
    }
    .result_amount em { color: #1345d1; font-style: normal; }

    /* 구분선 */
    .section_divider { height: 8px; background: #f2f3f8; margin: 0 -20px 0; }

    /* 금액/수익률 탭 */
    .small_tabs { display: flex; gap: 4px; margin: 16px 0 12px; }
    .small_tab {
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: none; cursor: pointer; background: #f2f3f8; color: #697387;
      font-family: 'Pretendard', sans-serif;
    }
    .small_tab.active { background: #1345d1; color: #fff; }

    /* ETF 목록 */
    .etf_list { display: flex; flex-direction: column; }
    .etf_item {
      display: flex; align-items: center; gap: 12px; padding: 14px 0;
      border-bottom: 1px solid #f2f3f8;
    }
    .etf_item:last-child { border-bottom: none; }
    .etf_thumb {
      width: 44px; height: 44px; border-radius: 10px; background: #e8edfc;
      display: flex; align-items: center; justify-content: center;
      flex: 0 0 44px; font-size: 10px; font-weight: 700; color: #1345d1;
    }
    .etf_info { flex: 1; min-width: 0; }
    .etf_name { font-size: 14px; font-weight: 600; color: #141924; margin-bottom: 3px; }
    .etf_invest { font-size: 12px; color: #697387; }
    .etf_right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .etf_dividend { font-size: 14px; font-weight: 700; color: #009aff; }
    .etf_calc { color: #697387; cursor: pointer; }

    /* 하단 버튼 */
    .bottom_btns {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #fff; padding: 12px 16px 28px; display: flex; gap: 8px;
      border-top: 1px solid #f2f3f8;
    }
    .btn_secondary {
      flex: 1; height: 52px; border: 1.5px solid #1345d1; border-radius: 8px;
      background: #fff; color: #1345d1; font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: 'Pretendard', sans-serif;
    }
    .btn_primary {
      flex: 1; height: 52px; background: #1345d1; border: none; border-radius: 8px;
      color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: 'Pretendard', sans-serif;
    }
  </style>
</head>
<body>
  <header class="page_header">
    <button class="btn_back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="#141924" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="header_title">포트폴리오 제안</span>
    <button class="icon_btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#141924" stroke-width="2">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </button>
  </header>

  <main>
    <div class="result_tag">Max 월배당 홀릭</div>

    <div class="selector_text">
      <span class="selector_inline">최근 1년 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
      동안
    </div>
    <div class="selector_text">
      <span class="selector_inline">5,000만원 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
      을 투자했다면
    </div>

    <div class="result_amount">
      <em>760만원(15.21%)</em><br>배당 받았을 거예요!
    </div>

    <div class="section_divider"></div>

    <div class="small_tabs">
      <button class="small_tab active">금액</button>
      <button class="small_tab">수익률</button>
    </div>

    <!-- ETF 목록 -->
    <div class="etf_list">
      <div class="etf_item">
        <div class="etf_thumb">원자력</div>
        <div class="etf_info">
          <div class="etf_name">ACE 원자력TOP10</div>
          <div class="etf_invest">투자액 1,200만원</div>
        </div>
        <div class="etf_right">
          <div class="etf_dividend">183만원</div>
          <button class="etf_calc icon_btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="4" y="2" width="16" height="20" rx="2"/>
              <line x1="8" y1="6" x2="16" y2="6"/>
              <line x1="8" y1="10" x2="16" y2="10"/>
              <line x1="8" y1="14" x2="12" y2="14"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="etf_item">
        <div class="etf_thumb">AI반도</div>
        <div class="etf_info">
          <div class="etf_name">ACE AI반도체TOP3+</div>
          <div class="etf_invest">투자액 1,000만원</div>
        </div>
        <div class="etf_right">
          <div class="etf_dividend">203만원</div>
          <button class="etf_calc icon_btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="4" y="2" width="16" height="20" rx="2"/>
              <line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/>
              <line x1="8" y1="14" x2="12" y2="14"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="etf_item">
        <div class="etf_thumb">200</div>
        <div class="etf_info">
          <div class="etf_name">ACE 200</div>
          <div class="etf_invest">투자액 800만원</div>
        </div>
        <div class="etf_right">
          <div class="etf_dividend">112만원</div>
          <button class="etf_calc icon_btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="4" y="2" width="16" height="20" rx="2"/>
              <line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/>
              <line x1="8" y1="14" x2="12" y2="14"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="etf_item">
        <div class="etf_thumb">200TR</div>
        <div class="etf_info">
          <div class="etf_name">ACE 200TR</div>
          <div class="etf_invest">투자액 600만원</div>
        </div>
        <div class="etf_right">
          <div class="etf_dividend">96만원</div>
          <button class="etf_calc icon_btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="4" y="2" width="16" height="20" rx="2"/>
              <line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/>
              <line x1="8" y1="14" x2="12" y2="14"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="etf_item">
        <div class="etf_thumb">밸류</div>
        <div class="etf_info">
          <div class="etf_name">ACE 코리아밸류업</div>
          <div class="etf_invest">투자액 1,400만원</div>
        </div>
        <div class="etf_right">
          <div class="etf_dividend">166만원</div>
          <button class="etf_calc icon_btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="4" y="2" width="16" height="20" rx="2"/>
              <line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/>
              <line x1="8" y1="14" x2="12" y2="14"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <div class="bottom_btns">
    <button class="btn_secondary">새로 만들기</button>
    <button class="btn_primary">저장하기</button>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    $('.small-tab').on('click', function() {
      $(this).siblings().removeClass('active');
      $(this).addClass('active');
    });
  </script>
</body>
</html>
