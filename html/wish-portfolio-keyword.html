<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 투자 키워드 선택</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root { --primary: #1345d1; }
    * { box-sizing: border-box; }
    body { background: #fff; margin: 0; font-family: 'Pretendard', sans-serif; }

    .page-header {
      position: fixed; top: 0; left: 0; width: 100%; height: 56px; background: #fff;
      display: flex; align-items: center; gap: 8px;
      padding: 0 20px; z-index: 100; border-bottom: 1px solid #f2f3f8;
    }
    .btn-back { background: none; border: none; cursor: pointer; padding: 0; }
    .header-title { flex: 1; font-size: 18px; font-weight: 700; color: #141924; }

    main { padding: 56px 20px 100px; }
    .page-title { font-size: 22px; font-weight: 700; color: #141924; margin: 20px 0 6px; line-height: 1.35; }
    .page-subtitle { font-size: 14px; color: #697387; margin: 0 0 24px; }

    /* 키워드 태그 */
    .keyword-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .keyword-tag {
      padding: 8px 14px; background: #f2f3f8; border-radius: 8px;
      font-size: 14px; font-weight: 500; color: #697387; cursor: pointer; border: none;
      font-family: 'Pretendard', sans-serif; transition: all 0.15s;
    }
    .keyword-tag.active {
      background: #e8edfc; color: #1345d1; border: 1.5px solid #1345d1;
    }

    /* 구분선 */
    .divider { height: 8px; background: #f2f3f8; margin: 0 -20px 20px; }

    /* 투자유의문구 아코디언 */
    .accordion {
      border: 1px solid #e5e8ef; border-radius: 8px; overflow: hidden;
    }
    .accordion-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; cursor: pointer; background: #fff;
    }
    .accordion-header span { font-size: 13px; font-weight: 600; color: #697387; }
    .accordion-header svg { transition: transform 0.2s; }
    .accordion-header.open svg { transform: rotate(180deg); }
    .accordion-body {
      display: none; padding: 0 16px 16px; background: #fff;
    }
    .accordion-body.open { display: block; }
    .accordion-body ul { margin: 0; padding-left: 16px; }
    .accordion-body li { font-size: 12px; color: #697387; line-height: 18px; margin-bottom: 6px; }

    /* 하단 버튼 */
    .bottom-btns {
      position: fixed; bottom: 0; left: 0; width: 100%; background: #fff;
      padding: 12px 16px 28px; display: flex; gap: 8px; border-top: 1px solid #f2f3f8;
    }
    .btn-secondary {
      flex: 1; height: 52px; border: 1.5px solid #1345d1; border-radius: 8px;
      background: #fff; color: #1345d1; font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: 'Pretendard', sans-serif;
    }
    .btn-primary {
      flex: 1; height: 52px; background: #1345d1; border: none; border-radius: 8px;
      color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: 'Pretendard', sans-serif;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <button class="btn-back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="#141924" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="header-title">월배당 포트</span>
    <button style="background:none; border:none; cursor:pointer; padding:4px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#141924" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </header>

  <main>
    <h2 class="page-title">원하시는 투자 키워드를<br>선택하세요</h2>
    <p class="page-subtitle">여러 개 선택할 수 있어요</p>

    <div class="keyword-wrap">
      <button class="keyword-tag active">전체</button>
      <button class="keyword-tag">국내주식</button>
      <button class="keyword-tag">해외주식</button>
      <button class="keyword-tag">채권</button>
      <button class="keyword-tag">통화</button>
      <button class="keyword-tag">자산배분</button>
      <button class="keyword-tag">레버리지/인버스</button>
      <button class="keyword-tag">금리</button>
      <button class="keyword-tag">원자재</button>
      <button class="keyword-tag">부동산</button>
    </div>

    <div class="divider"></div>

    <!-- 투자유의문구 아코디언 -->
    <div class="accordion">
      <div class="accordion-header open" id="accordionHeader" onclick="toggleAccordion()">
        <span>투자유의문구</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#697387" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="accordion-body open" id="accordionBody">
        <ul>
          <li>분배금 지급 여부 및 지급액은 운용 상황에 따라 변경될 수 있습니다.</li>
          <li>투자원금의 일부 또는 전부 손실이 발생할 수 있으며, 투자 손익은 투자자에게 귀속됩니다.</li>
          <li>ETF는 예금자보호법에 따른 예금보호 대상이 아닙니다.</li>
          <li>이 상품은 집합투자기구로서 운용결과에 따라 투자원금의 손실이 발생할 수 있습니다.</li>
          <li>과거의 운용실적이 미래의 수익을 보장하지 않습니다.</li>
        </ul>
      </div>
    </div>
  </main>

  <!-- 하단 버튼 -->
  <div class="bottom-btns">
    <button class="btn-secondary">새로 만들기</button>
    <button class="btn-primary">저장하기</button>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    // 키워드 태그 토글
    $('.keyword-tag').on('click', function() {
      if ($(this).text() === '전체') {
        $('.keyword-tag').removeClass('active');
        $(this).addClass('active');
      } else {
        $('.keyword-tag:first').removeClass('active');
        $(this).toggleClass('active');
      }
    });

    // 아코디언
    function toggleAccordion() {
      $('#accordionHeader').toggleClass('open');
      $('#accordionBody').toggleClass('open');
    }
  </script>
</body>
</html>
