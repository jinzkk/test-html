<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input 컴포넌트 가이드</title>
  <link rel="stylesheet" href="../../css/common.css">
</head>
<body>
  <header>
    <h1>Input 컴포넌트 가이드</h1>
  </header>

  <main>
    <!-- Default 상태 -->
    <section class="guide_section">
      <h2 class="guide_section_title">Default 상태</h2>
      <div class="guide_row">
        <!-- Size 48 -->
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨</label>
            <div class="input_box input_box_size_48 input_box_default">
              <input type="text" class="input_field input_field_default" placeholder="Text">
            </div>
          </div>
        </div>

        <!-- Size 40 -->
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨</label>
            <div class="input_box input_box_size_40 input_box_default">
              <input type="text" class="input_field input_field_default" placeholder="Text">
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Focus 상태 -->
    <section class="guide_section">
      <h2 class="guide_section_title">Focus 상태</h2>
      <div class="guide_row">
        <!-- Size 48 -->
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨</label>
            <div class="input_box input_box_size_48 input_box_focus">
              <input type="text" class="input_field input_field_focus" placeholder="Text">
            </div>
          </div>
        </div>

        <!-- Size 40 -->
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨</label>
            <div class="input_box input_box_size_40 input_box_focus">
              <input type="text" class="input_field input_field_focus" placeholder="Text">
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Completed 상태 -->
    <section class="guide_section">
      <h2 class="guide_section_title">Completed 상태</h2>
      <div class="guide_row">
        <!-- Size 48 -->
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨</label>
            <div class="input_box input_box_size_48 input_box_completed">
              <input type="text" class="input_field input_field_completed" value="입력된 텍스트">
            </div>
          </div>
        </div>

        <!-- Size 40 -->
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨</label>
            <div class="input_box input_box_size_40 input_box_completed">
              <input type="text" class="input_field input_field_completed" value="입력된 텍스트">
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Error 상태 -->
    <section class="guide_section">
      <h2 class="guide_section_title">Error 상태</h2>
      <div class="guide_row">
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨</label>
            <div class="input_box input_box_size_48 input_box_error">
              <input type="text" class="input_field input_field_error" value="잘못된 입력">
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Disabled 상태 -->
    <section class="guide_section">
      <h2 class="guide_section_title">Disabled 상태</h2>
      <div class="guide_row">
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨</label>
            <div class="input_box input_box_size_48 input_box_disabled">
              <input type="text" class="input_field input_field_disabled" placeholder="Text" disabled>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- View 상태 -->
    <section class="guide_section">
      <h2 class="guide_section_title">View 상태 (읽기전용)</h2>
      <div class="guide_row">
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨</label>
            <div class="input_box input_box_size_48 input_box_view">
              <input type="text" class="input_field input_field_view" value="읽기전용 텍스트" readonly>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 필수 입력 표시 -->
    <section class="guide_section">
      <h2 class="guide_section_title">필수 입력 표시</h2>
      <div class="guide_row">
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨 <span class="input_required">*</span></label>
            <div class="input_box input_box_size_48 input_box_default">
              <input type="text" class="input_field input_field_default" placeholder="Text">
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 캡션 텍스트 -->
    <section class="guide_section">
      <h2 class="guide_section_title">캡션 텍스트</h2>
      <div class="guide_row">
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨</label>
            <div class="input_box input_box_size_48 input_box_default">
              <input type="text" class="input_field input_field_default" placeholder="Text">
            </div>
            <div class="input_caption">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="7" cy="7" r="6" stroke="#697387" stroke-width="1.2"/>
                <path d="M7 6.5V10" stroke="#697387" stroke-width="1.2" stroke-linecap="round"/>
                <circle cx="7" cy="4.5" r="0.6" fill="#697387"/>
              </svg>
              이는 도움말 텍스트입니다
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 에러 메시지 -->
    <section class="guide_section">
      <h2 class="guide_section_title">에러 메시지</h2>
      <div class="guide_row">
        <div class="guide_item">
          <div class="input_wrap">
            <label class="input_label">라벨</label>
            <div class="input_box input_box_size_48 input_box_error">
              <input type="text" class="input_field input_field_error" value="잘못된 입력">
            </div>
            <div class="input_error_msg">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="7" cy="7" r="6" stroke="#FF4444" stroke-width="1.2"/>
                <path d="M7 4V8" stroke="#FF4444" stroke-width="1.2" stroke-linecap="round"/>
                <circle cx="7" cy="10" r="0.6" fill="#FF4444"/>
              </svg>
              필수 입력항목입니다
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 HTML5 프로젝트 - Input 컴포넌트 가이드</p>
  </footer>

  <!-- jQuery 로드 -->
  <script src="../../js/lib/jquery-3.7.1.min.js"></script>
  <!-- 공통 JS 로드 -->
  <script src="../../js/common.js"></script>
</body>
</html>
