<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button 컴포넌트 가이드</title>
  <link rel="stylesheet" href="../../css/common.css">
</head>
<body>
  <header>
    <h1>Button 컴포넌트 가이드</h1>
  </header>

  <main>
    <!-- Tag: Solid 타입 -->
    <section class="guide-section">
      <h2 class="guide-section-title">Tag - Solid</h2>
      <div class="guide-row">
        <div class="guide-item">
          <span class="tag tag--solid-black">TAG</span>
        </div>
        <div class="guide-item">
          <span class="tag tag--solid-red">TAG</span>
        </div>
        <div class="guide-item">
          <span class="tag tag--solid-sky">TAG</span>
        </div>
        <div class="guide-item">
          <span class="tag tag--solid-blue">TAG</span>
        </div>
      </div>
    </section>

    <!-- Tag: Line 타입 -->
    <section class="guide-section">
      <h2 class="guide-section-title">Tag - Line</h2>
      <div class="guide-row">
        <div class="guide-item">
          <span class="tag tag--line-black">TAG</span>
        </div>
        <div class="guide-item">
          <span class="tag tag--line-red">TAG</span>
        </div>
        <div class="guide-item">
          <span class="tag tag--line-sky">TAG</span>
        </div>
        <div class="guide-item">
          <span class="tag tag--line-blue">TAG</span>
        </div>
      </div>
    </section>

    <!-- Button: Primary -->
    <section class="guide-section">
      <h2 class="guide-section-title">Button - Primary</h2>
      <div class="guide-row">
        <div class="guide-item">
          <button class="btn btn--primary btn--size-52">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--primary btn--size-48">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--primary btn--size-40">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--primary btn--size-28">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--primary btn--size-26">Button</button>
        </div>
      </div>
    </section>

    <!-- Button: Secondary -->
    <section class="guide-section">
      <h2 class="guide-section-title">Button - Secondary</h2>
      <div class="guide-row">
        <div class="guide-item">
          <button class="btn btn--secondary btn--size-52">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--secondary btn--size-48">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--secondary btn--size-40">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--secondary btn--size-28">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--secondary btn--size-26">Button</button>
        </div>
      </div>
    </section>

    <!-- Button: Tertiary -->
    <section class="guide-section">
      <h2 class="guide-section-title">Button - Tertiary</h2>
      <div class="guide-row">
        <div class="guide-item">
          <button class="btn btn--tertiary btn--size-52">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--tertiary btn--size-48">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--tertiary btn--size-40">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--tertiary btn--size-28">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--tertiary btn--size-26">Button</button>
        </div>
      </div>
    </section>

    <!-- Button: Function -->
    <section class="guide-section">
      <h2 class="guide-section-title">Button - Function</h2>
      <div class="guide-row">
        <div class="guide-item">
          <button class="btn btn--function btn--size-52">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--function btn--size-48">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--function btn--size-40">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--function btn--size-28">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--function btn--size-26">Button</button>
        </div>
      </div>
    </section>

    <!-- Button: Error -->
    <section class="guide-section">
      <h2 class="guide-section-title">Button - Error</h2>
      <div class="guide-row">
        <div class="guide-item">
          <button class="btn btn--error btn--size-52">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--error btn--size-48">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--error btn--size-40">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--error btn--size-28">Button</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--error btn--size-26">Button</button>
        </div>
      </div>
    </section>

    <!-- Button: Disabled 상태 -->
    <section class="guide-section">
      <h2 class="guide-section-title">Button - Disabled</h2>
      <div class="guide-row">
        <div class="guide-item">
          <button class="btn btn--primary btn--size-48" disabled>Primary</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--secondary btn--size-48" disabled>Secondary</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--tertiary btn--size-48" disabled>Tertiary</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--function btn--size-48" disabled>Function</button>
        </div>
        <div class="guide-item">
          <button class="btn btn--error btn--size-48" disabled>Error</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 HTML5 프로젝트 - Button 컴포넌트 가이드</p>
  </footer>

  <!-- jQuery 로드 -->
  <script src="../../js/lib/jquery-3.7.1.min.js"></script>
  <!-- 공통 JS 로드 -->
  <script src="../../js/common.js"></script>
</body>
</html>
