<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>포트래빗</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /* B형 헤더 */
    .page-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #E6E9EF;
      display: flex;
      align-items: center;
      padding: 0 8px 0 4px;
      z-index: 100;
      gap: 4px;
    }
    .page-header__back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      cursor: pointer;
      color: #232433;
      flex-shrink: 0;
    }
    .page-header__title {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      color: #232433;
      margin: 0;
    }
    .page-header__actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .page-header__btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      cursor: pointer;
      color: #494B55;
    }
    .page-header__story-btn {
      height: 32px;
      padding: 0 14px;
      background: #5B5FE4;
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    /* 토끼 캐릭터 영역 */
    .rabbit-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 16px;
      background: linear-gradient(180deg, #F0F2FF 0%, #fff 100%);
    }
    .rabbit-avatar {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #E8ECFF 0%, #C8CCFF 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 56px;
    }
    .rabbit-hero__title {
      font-size: 20px;
      font-weight: 700;
      color: #232433;
      text-align: center;
      line-height: 1.4;
    }

    /* 추천 배지 */
    .recommend-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #EEF0FF;
      border-radius: 100px;
      padding: 6px 14px;
      margin: 12px 20px;
    }
    .recommend-badge__dot {
      width: 6px;
      height: 6px;
      background: #5B5FE4;
      border-radius: 50%;
    }
    .recommend-badge__text {
      font-size: 13px;
      font-weight: 500;
      color: #5B5FE4;
    }

    /* 포트 타입 카드 */
    .port-type-list {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .port-type-card {
      background: #fff;
      border: 1px solid #E6E9EF;
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .port-type-card:hover {
      border-color: #5B5FE4;
    }
    .port-type-card__icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #F0F2FF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .port-type-card__info {
      flex: 1;
      min-width: 0;
    }
    .port-type-card__title {
      font-size: 16px;
      font-weight: 700;
      color: #232433;
      margin-bottom: 4px;
    }
    .port-type-card__desc {
      font-size: 13px;
      font-weight: 400;
      color: #71747C;
      line-height: 1.4;
    }
    .port-type-card__arrow {
      color: #B4B6BC;
      flex-shrink: 0;
    }

    /* 더보기 버튼 */
    .btn-more {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 16px;
      background: none;
      border: none;
      font-size: 15px;
      font-weight: 500;
      color: #71747C;
      cursor: pointer;
      gap: 4px;
    }
  </style>
</head>
<body>

  <!-- B형 헤더 -->
  <header class="page-header">
    <button class="page-header__back" onclick="history.back()" aria-label="뒤로">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="page-header__title">포트래빗</h1>
    <div class="page-header__actions">
      <button class="page-header__btn" aria-label="검색">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M16.5 16.5L20 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="page-header__story-btn">포트래빗 스토리</button>
    </div>
  </header>

  <!-- 토끼 캐릭터 + 타이틀 -->
  <div class="rabbit-hero">
    <div class="rabbit-avatar">🐰</div>
    <h2 class="rabbit-hero__title">포트래빗이 포트폴리오를<br>만들어 드려요!</h2>
  </div>

  <!-- 추천 배지 -->
  <div style="padding: 0 20px;">
    <div class="recommend-badge">
      <span class="recommend-badge__dot"></span>
      <span class="recommend-badge__text">지금 가장 많은 사람들이 선택한 포트메요</span>
    </div>
  </div>

  <!-- 포트 타입 카드 3개 -->
  <div class="port-type-list">
    <div class="port-type-card">
      <div class="port-type-card__icon">📅</div>
      <div class="port-type-card__info">
        <div class="port-type-card__title">월배당 포트</div>
        <div class="port-type-card__desc">매월 배당금을 받을 수 있는<br>월배당 ETF 포트폴리오</div>
      </div>
      <div class="port-type-card__arrow">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M9 6L15 12L9 18" stroke="#B4B6BC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="port-type-card">
      <div class="port-type-card__icon">📈</div>
      <div class="port-type-card__info">
        <div class="port-type-card__title">연금/ISA 포트</div>
        <div class="port-type-card__desc">연금계좌, ISA에 최적화된<br>절세형 ETF 포트폴리오</div>
      </div>
      <div class="port-type-card__arrow">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M9 6L15 12L9 18" stroke="#B4B6BC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="port-type-card">
      <div class="port-type-card__icon">💰</div>
      <div class="port-type-card__info">
        <div class="port-type-card__title">증여 솔루션</div>
        <div class="port-type-card__desc">자녀 증여에 최적화된<br>장기 ETF 포트폴리오</div>
      </div>
      <div class="port-type-card__arrow">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M9 6L15 12L9 18" stroke="#B4B6BC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- 더보기 버튼 -->
  <button class="btn-more">더보기 ∨</button>

  <!-- 하단 네비게이션 -->
  <nav class="bottom-nav" id="bottomNav">
    <div class="bottom-nav__inner">
      <button class="bottom-nav__item" data-nav="home">
        <span class="bottom-nav__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v11a1 1 0 001 1h4v-6h6v6h4a1 1 0 001-1V9l-8-6z"/></svg>
        </span>
        <span class="bottom-nav__label">홈</span>
      </button>
      <button class="bottom-nav__item" data-nav="etf-search">
        <span class="bottom-nav__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L20 20" stroke-linecap="round"/></svg>
        </span>
        <span class="bottom-nav__label">ETF검색</span>
      </button>
      <button class="bottom-nav__item" data-nav="etf-compare">
        <span class="bottom-nav__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="14" width="4" height="7" rx="0.5"/><rect x="10" y="5" width="4" height="16" rx="0.5"/><rect x="17" y="9" width="4" height="12" rx="0.5"/></svg>
        </span>
        <span class="bottom-nav__label">ETF비교</span>
      </button>
      <button class="bottom-nav__item bottom-nav__item--active" data-nav="portrabbit">
        <span class="bottom-nav__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8 2 6 5 6 8c0 2 1 3.5 2 4.5V15h8v-2.5c1-1 2-2.5 2-4.5 0-3-2-6-6-6z"/><path d="M9 15v4a1 1 0 001 1h4a1 1 0 001-1v-4"/><path d="M6 8C4 8 3 9 3 10s1 2 3 2"/><path d="M18 8c2 0 3 1 3 2s-1 2-3 2"/></svg>
        </span>
        <span class="bottom-nav__label">포트래빗</span>
      </button>
      <button class="bottom-nav__item" data-nav="menu">
        <span class="bottom-nav__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </span>
        <span class="bottom-nav__label">메뉴</span>
      </button>
    </div>
  </nav>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    $('#bottomNav').on('click', '.bottom-nav__item', function() {
      $('#bottomNav .bottom-nav__item').removeClass('bottom-nav__item--active');
      $(this).addClass('bottom-nav__item--active');
    });
  </script>
</body>
</html>
