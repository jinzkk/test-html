<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 통신사 선택</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root {
      --primary: #1345d1;
      --primary-light: #e8edfc;
    }

    .page-header {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 56px; background: #fff;
      border-bottom: 1px solid #E6E9EF;
      display: flex; align-items: center; padding: 0 8px 0 4px; z-index: 100;
    }
    .page-header__back {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; background: none; border: none; cursor: pointer; color: #232433;
    }
    .progress-bar {
      position: fixed; top: 56px; left: 0;
      width: 100%; height: 3px; background: #E6E9EF; z-index: 100;
    }
    .progress-bar__fill { height: 100%; background: var(--primary); border-radius: 0 2px 2px 0; width: 75%; }

    .content-area { padding: 28px 20px 20px; }
    .content-area__title { font-size: 22px; font-weight: 800; color: #232433; margin-bottom: 28px; line-height: 1.35; }

    .input-list { display: flex; flex-direction: column; gap: 16px; }
    .input-item__label { font-size: 12px; font-weight: 600; color: #93959C; margin-bottom: 6px; }
    .input-item__field {
      width: 100%; height: 48px; padding: 0 14px;
      border: 1.5px solid #E6E9EF; border-radius: 4px;
      font-size: 15px; color: #232433; background: #fff; outline: none; font-family: inherit;
    }
    .input-item__field:read-only { background: #F8F9FF; color: #71747C; }
    .input-item__field--focused { border-color: var(--primary); border-width: 2px; }
    .input-item__field-wrap { position: relative; }
    .input-item__field-wrap .input-item__field { padding-right: 40px; }
    .input-item__chevron {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #93959C; pointer-events: none;
    }

    .bottom-sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; display: none;
    }
    .bottom-sheet-overlay.is-open { display: block; }

    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #fff; border-radius: 20px 20px 0 0; z-index: 400;
      padding-bottom: 24px;
      transform: translateY(100%); transition: transform 0.3s ease;
    }
    .bottom-sheet.is-open { transform: translateY(0); }
    .bottom-sheet__handle {
      width: 36px; height: 4px; background: #D0D3DC; border-radius: 2px; margin: 12px auto 20px;
    }
    .bottom-sheet__title {
      padding: 0 20px 14px; font-size: 16px; font-weight: 700; color: #232433;
      border-bottom: 1px solid #F4F6FB;
    }
    .bottom-sheet__options { padding: 8px 0; }
    .bottom-sheet__option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 20px; font-size: 16px; color: #232433; cursor: pointer;
      background: none; border: none; width: 100%; text-align: left;
    }
    .bottom-sheet__option:hover { background: #F8F9FF; }
    .bottom-sheet__option--selected { color: var(--primary); font-weight: 700; }
    .bottom-sheet__check { color: var(--primary); }

    /* 알뜰폰 서브 옵션 */
    .sub-options {
      display: none;
      background: #F8F9FF;
      border-top: 1px solid #F4F6FB;
    }
    .sub-options.is-open { display: block; }
    .sub-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 20px 13px 36px; font-size: 14px; color: #494B55; cursor: pointer;
      background: none; border: none; width: 100%; text-align: left;
    }
    .sub-option:hover { background: #f0f2ff; }
  </style>
</head>
<body>
  <header class="page-header">
    <button class="page-header__back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
  </header>
  <div class="progress-bar"><div class="progress-bar__fill"></div></div>

  <main style="padding-bottom: 20px;">
    <div class="content-area">
      <h2 class="content-area__title">사용하는 통신사가<br>어디인가요?</h2>
      <div class="input-list">
        <div class="input-item">
          <div class="input-item__label">이름</div>
          <input class="input-item__field" type="text" value="김한투" readonly>
        </div>
        <div class="input-item">
          <div class="input-item__label">생년월일</div>
          <input class="input-item__field" type="text" value="1990.01.01" readonly>
        </div>
        <div class="input-item">
          <div class="input-item__label">성별</div>
          <input class="input-item__field" type="text" value="여성" readonly>
        </div>
        <div class="input-item">
          <div class="input-item__label">국적</div>
          <input class="input-item__field" type="text" value="예 (대한민국)" readonly>
        </div>
        <div class="input-item">
          <div class="input-item__label">통신사</div>
          <div class="input-item__field-wrap">
            <div class="input-item__field input-item__field--focused"
              style="cursor:pointer; line-height:48px; display:flex; align-items:center;" onclick="openSheet()">
              <span id="carrierDisplay" style="color:#B5B8C0;">선택하세요</span>
            </div>
            <span class="input-item__chevron">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="bottom-sheet-overlay" id="overlay" onclick="closeSheet()"></div>

  <div class="bottom-sheet" id="sheet">
    <div class="bottom-sheet__handle"></div>
    <div class="bottom-sheet__title">통신사를 선택해주세요</div>
    <div class="bottom-sheet__options">
      <button class="bottom-sheet__option" data-val="SKT" onclick="selectCarrier(this)">
        <span>SKT</span>
        <svg class="bottom-sheet__check" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <button class="bottom-sheet__option" data-val="KT" onclick="selectCarrier(this)">
        <span>KT</span>
        <svg class="bottom-sheet__check" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <button class="bottom-sheet__option" data-val="LGU+" onclick="selectCarrier(this)">
        <span>LGU+</span>
        <svg class="bottom-sheet__check" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <button class="bottom-sheet__option" data-val="알뜰폰" onclick="toggleMvno(this)">
        <span>알뜰폰</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <!-- 알뜰폰 서브 옵션 -->
      <div class="sub-options" id="mvnoOptions">
        <button class="sub-option" data-val="SKT 알뜰폰" onclick="selectCarrier(this)">SKT 알뜰폰</button>
        <button class="sub-option" data-val="KT 알뜰폰" onclick="selectCarrier(this)">KT 알뜰폰</button>
        <button class="sub-option" data-val="LGU+ 알뜰폰" onclick="selectCarrier(this)">LGU+ 알뜰폰</button>
      </div>
    </div>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    function openSheet() {
      $('#overlay').addClass('is-open');
      $('#sheet').addClass('is-open');
    }
    function closeSheet() {
      $('#overlay').removeClass('is-open');
      $('#sheet').removeClass('is-open');
    }
    function selectCarrier(el) {
      var val = $(el).data('val');
      $('.bottom-sheet__option').removeClass('bottom-sheet__option--selected');
      $('.bottom-sheet__check').hide();
      $(el).addClass('bottom-sheet__option--selected');
      $(el).find('.bottom-sheet__check').show();
      $('#carrierDisplay').text(val).css('color', '#232433');
      setTimeout(closeSheet, 200);
    }
    function toggleMvno(el) {
      $('#mvnoOptions').toggleClass('is-open');
    }
  </script>
</body>
</html>
