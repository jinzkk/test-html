<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>회원가입 01. 유형 선택</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /* B형 헤더 */
    .page_header {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 56px;
      background: #fff;
      border-bottom: 1px solid #E6E9EF;
      display: flex; align-items: center;
      padding: 0 8px 0 4px;
      z-index: 100;
    }
    .page_header_back {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      background: none; border: none; cursor: pointer; color: #232433;
    }
    .page_header_title {
      flex: 1; font-size: 18px; font-weight: 700; color: #232433; margin: 0;
    }

    /* 스텝 인디케이터 */
    .step_indicator {
      display: flex;
      align-items: center;
      padding: 20px 20px 0;
      gap: 0;
      margin-bottom: 28px;
    }
    .step_item {
      display: flex; flex-direction: column; align-items: center;
      position: relative;
    }
    .step_item_circle {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #F0F2F6;
      border: 1.5px solid #D4D8E2;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #93959C;
    }
    .step_item_circle_active {
      background: #fff;
      border-color: #0055FF;
      color: #0055FF;
    }
    .step_item_circle_done {
      background: #0055FF;
      border-color: #0055FF;
      color: #fff;
    }
    .step_item_label {
      font-size: 11px; font-weight: 500; color: #93959C;
      margin-top: 4px; white-space: nowrap;
    }
    .step_item_label_active {
      color: #0055FF; font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .step_connector {
      height: 1.5px;
      background: #D4D8E2;
      flex: 1;
      margin-bottom: 20px;
    }

    /* 페이지 콘텐츠 */
    .page_content { padding: 0 20px; }
    .page_title {
      font-size: 22px; font-weight: 700; color: #232433;
      line-height: 1.4; margin-bottom: 24px;
    }

    /* 타입 카드 */
    .type_card {
      border: 2px solid #E6E9EF;
      border-radius: 16px;
      padding: 20px;
      display: flex; align-items: flex-start; gap: 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 12px;
    }
    .type_card_active {
      border-color: #0055FF;
      background: #F5F8FF;
    }
    .type_card_icon {
      width: 52px; height: 52px;
      border-radius: 12px;
      background: #F0F2F6;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .type_card_active .type_card_icon {
      background: #EBF0FF;
    }
    .type_card_info { flex: 1; }
    .type_card_title {
      font-size: 17px; font-weight: 700; color: #232433;
      margin-bottom: 4px;
    }
    .type_card_active .type_card_title {
      color: #0055FF;
    }
    .type_card_desc {
      font-size: 13px; color: #71747C; line-height: 1.5;
    }
    .type_card_check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid #D4D8E2;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .type_card_active .type_card_check {
      background: #0055FF;
      border-color: #0055FF;
    }

    /* 하단 고정 버튼 */
    .bottom_fixed_btn {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px 20px;
      background: #fff;
      border-top: 1px solid #F0F2F6;
    }
    .next_btn {
      width: 100%; height: 56px;
      background: #0055FF; color: #fff;
      border: none; border-radius: 12px;
      font-size: 17px; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- B형 헤더 -->
  <header class="page_header">
    <button class="page_header_back" onclick="history.back()" aria-label="뒤로">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="page_header_title">회원가입</h1>
  </header>

  <!-- 스텝 인디케이터 -->
  <div class="step_indicator">
    <div class="step_item">
      <div class="step_item_circle step_item_circle_active">1</div>
      <div class="step_item_label step_item_label_active">유형 선택</div>
    </div>
    <div class="step_connector"></div>
    <div class="step_item">
      <div class="step_item_circle">2</div>
      <div class="step_item_label">약관 동의</div>
    </div>
    <div class="step_connector"></div>
    <div class="step_item">
      <div class="step_item_circle">3</div>
      <div class="step_item_label">정보입력</div>
    </div>
    <div class="step_connector"></div>
    <div class="step_item">
      <div class="step_item_circle">4</div>
      <div class="step_item_label">완료</div>
    </div>
  </div>

  <!-- 콘텐츠 -->
  <div class="page_content">
    <h2 class="page_title">회원 유형을 선택해주세요.</h2>

    <!-- 판매자 카드 -->
    <div class="type_card" id="typeVendor" onclick="selectType('vendor')">
      <div class="type_card_icon">💼</div>
      <div class="type_card_info">
        <div class="type_card_title">판매자</div>
        <div class="type_card_desc">PB, 투권인 등 금융상품 판매 전문가<br>고객 포트폴리오 관리가 필요한 분</div>
      </div>
      <div class="type_card_check" id="checkVendor"></div>
    </div>

    <!-- 투자자 카드 (선택됨) -->
    <div class="type_card type_card_active" id="typeInvestor" onclick="selectType('investor')">
      <div class="type_card_icon">🪙</div>
      <div class="type_card_info">
        <div class="type_card_title">투자자</div>
        <div class="type_card_desc">ETF와 펀드에 직접 투자하는 개인 투자자<br>나만의 포트폴리오를 만들고 싶은 분</div>
      </div>
      <div class="type_card_check type_card_active" id="checkInvestor">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- 하단 고정 버튼 -->
  <div class="bottom_fixed_btn">
    <button class="next_btn" onclick="location.href='signup-terms.html'">다음</button>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    var selectedType = 'investor';

    function selectType(type) {
      selectedType = type;
      /* 모든 카드 초기화 */
      $('#typeVendor').removeClass('type_card_active');
      $('#typeInvestor').removeClass('type_card_active');
      $('#checkVendor').html('').css({ background: '', borderColor: '' });
      $('#checkInvestor').html('').css({ background: '', borderColor: '' });

      var checkSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      if (type === 'vendor') {
        $('#typeVendor').addClass('type_card_active');
        $('#checkVendor').html(checkSvg).css({ background: '#0055FF', borderColor: '#0055FF' });
      } else {
        $('#typeInvestor').addClass('type_card_active');
        $('#checkInvestor').html(checkSvg).css({ background: '#0055FF', borderColor: '#0055FF' });
      }
    }
  </script>
</body>
</html>
