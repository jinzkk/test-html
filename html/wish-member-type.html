<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 회원 유형 선택</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root { --primary: #1345d1; }
    * { box-sizing: border-box; }
    body { background: #fff; margin: 0; font-family: 'Pretendard', sans-serif; }

    .page-header {
      position: fixed; top: 0; left: 0; width: 100%; height: 56px; background: #fff;
      display: flex; align-items: center; padding: 0 20px; z-index: 100;
    }
    .btn-back { background: none; border: none; cursor: pointer; padding: 0; }

    main { padding: 56px 20px 100px; }
    .page-title { font-size: 24px; font-weight: 700; color: #141924; line-height: 32px; margin: 20px 0 28px; }

    /* 카드 목록 */
    .type-list { display: flex; flex-direction: column; gap: 12px; }
    .type-card {
      border: 1.5px solid #f2f3f8; border-radius: 16px; padding: 24px 32px;
      background: #f2f3f8; cursor: pointer; display: flex; align-items: center; gap: 20px;
      transition: all 0.15s;
    }
    .type-card.active {
      background: #f0f9ff; border-color: #1345d1;
    }
    .type-icon {
      width: 60px; height: 60px; background: #e5e8ef; border-radius: 8px;
      flex: 0 0 60px; display: flex; align-items: center; justify-content: center;
    }
    .type-icon svg { color: #697387; }
    .type-info { flex: 1; }
    .type-name { font-size: 17px; font-weight: 700; color: #141924; margin-bottom: 4px; }
    .type-desc { font-size: 13px; color: #697387; line-height: 18px; }
    .type-badge {
      font-size: 11px; font-weight: 600; color: #1345d1; background: #e8edfc;
      padding: 2px 7px; border-radius: 4px; margin-top: 6px; display: inline-block;
    }

    /* 하단 버튼 */
    .bottom-btn {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #fff; padding: 12px 20px 32px; border-top: 1px solid #f2f3f8;
    }
    .btn-next {
      width: 100%; height: 52px; background: #1345d1; border: none; border-radius: 8px;
      color: #fff; font-size: 18px; font-weight: 500; cursor: pointer;
      font-family: 'Pretendard', sans-serif;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <button class="btn-back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="#141924" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <main>
    <h1 class="page-title">회원 유형을<br>선택해주세요.</h1>
    <div class="type-list">
      <!-- 초보자 -->
      <div class="type-card" onclick="selectType(this)">
        <div class="type-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="type-info">
          <div class="type-name">주식 초보자</div>
          <div class="type-desc">투자가 처음이거나 ETF에<br>관심이 생기신 분</div>
          <span class="type-badge">PB / 투권인 / 금융사 임직원 전용</span>
        </div>
      </div>

      <!-- 중수 -->
      <div class="type-card" onclick="selectType(this)">
        <div class="type-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <div class="type-info">
          <div class="type-name">주식 중수</div>
          <div class="type-desc">주식 투자 경험이 있고<br>ETF를 배우고 싶은 분</div>
          <span class="type-badge">PB / 투권인 / 금융사 임직원 전용</span>
        </div>
      </div>

      <!-- 고수 (기본 선택) -->
      <div class="type-card active" onclick="selectType(this)">
        <div class="type-icon" style="background:#e8edfc;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1345d1" stroke-width="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        <div class="type-info">
          <div class="type-name">주식 고수</div>
          <div class="type-desc">ETF와 펀드 투자자 서비스</div>
        </div>
      </div>
    </div>
  </main>

  <div class="bottom-btn">
    <button class="btn-next">다음</button>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    function selectType(el) {
      $('.type-card').removeClass('active');
      $('.type-icon').css('background', '#e5e8ef');
      $('.type-icon svg').css('stroke', '#697387');
      $(el).addClass('active');
      $(el).find('.type-icon').css('background', '#e8edfc');
      $(el).find('.type-icon svg').css('stroke', '#1345d1');
    }
  </script>
</body>
</html>
