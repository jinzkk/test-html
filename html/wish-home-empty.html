<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 홈 (빈 상태)</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root {
      --primary: #1345d1;
      --primary-light: #e8edfc;
    }

    /* 로고형 헤더 */
    .wish-header {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 56px;
      background: #fff;
      border-bottom: 1px solid #E6E9EF;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
    }
    .wish-header__logo {
      font-size: 22px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -0.5px;
    }
    .wish-header__logo span {
      font-size: 10px;
      vertical-align: super;
      color: var(--primary);
    }
    .wish-header__actions {
      display: flex;
      gap: 4px;
    }
    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
      background: none; border: none; cursor: pointer; color: #232433;
    }

    /* 선물 카드 가로 스크롤 */
    .futures-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 12px 16px;
      background: #F4F6FB;
    }
    .futures-scroll::-webkit-scrollbar { display: none; }
    .futures-card {
      flex-shrink: 0;
      background: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 110px;
      border: 1px solid #E6E9EF;
    }
    .futures-card__name { font-size: 12px; font-weight: 600; color: #232433; }
    .futures-card__price { font-size: 13px; font-weight: 700; color: #232433; margin-top: 4px; }
    .futures-card__change { font-size: 11px; margin-top: 2px; }
    .futures-card__change--up { color: #F14E4E; }
    .futures-card__change--down { color: #336AFF; }

    /* 검색 */
    .search-wrap {
      padding: 12px 16px;
      background: #fff;
    }
    .search-input-box {
      position: relative;
      background: linear-gradient(135deg, var(--primary), #6c8fff) padding-box,
                  linear-gradient(135deg, var(--primary), #6c8fff) border-box;
      border: 2px solid transparent;
      border-radius: 8px;
    }
    .search-input-box input {
      width: 100%;
      height: 44px;
      padding: 0 40px 0 14px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
      color: #232433;
      outline: none;
    }
    .search-input-box input::placeholder { color: #B5B8C0; }
    .search-input-box__icon {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
    }

    /* 섹션 */
    .wish-section {
      padding: 20px 16px 0;
    }
    .wish-section__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .wish-section__title {
      font-size: 18px;
      font-weight: 700;
      color: #232433;
    }
    .wish-section__more {
      font-size: 13px;
      color: #93959C;
      background: none;
      border: none;
      cursor: pointer;
    }

    /* 탭 */
    .wish-tab {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid #E6E9EF;
      gap: 0;
    }
    .wish-tab::-webkit-scrollbar { display: none; }
    .wish-tab__item {
      position: relative;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 500;
      color: #93959C;
      background: none;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .wish-tab__item--active {
      color: #232433;
      font-weight: 700;
    }
    .wish-tab__item--active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--primary);
      border-radius: 1px;
    }

    /* 빈 상태 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      text-align: center;
    }
    .empty-state__illust {
      width: 80px; height: 80px;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .empty-state__illust svg { color: var(--primary); }
    .empty-state__text {
      font-size: 14px;
      font-weight: 500;
      color: #71747C;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .empty-state__btn {
      height: 44px;
      padding: 0 24px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* 하단 탭바 */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 56px;
      background: #fff;
      border-top: 1px solid #E6E9EF;
      display: flex;
      z-index: 100;
    }
    .bottom-nav__item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      color: #B5B8C0;
      font-size: 10px;
      font-weight: 500;
    }
    .bottom-nav__item--active {
      color: var(--primary);
    }
    .bottom-nav__icon {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
    }

    .section-divider {
      height: 8px;
      background: #F4F6FB;
      margin: 20px 0 0;
    }
  </style>
</head>
<body>
  <!-- 로고형 헤더 -->
  <header class="wish-header">
    <div class="wish-header__logo">WISH<span>.</span></div>
    <div class="wish-header__actions">
      <button class="icon-btn" aria-label="알림">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <button class="icon-btn" aria-label="좋아요">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
      <button class="icon-btn" aria-label="검색">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <!-- 선물 가로 스크롤 -->
    <div class="futures-scroll">
      <div class="futures-card">
        <div class="futures-card__name">S&P500</div>
        <div class="futures-card__price">5,648.2</div>
        <div class="futures-card__change futures-card__change--up">▲ 12.3 (0.22%)</div>
      </div>
      <div class="futures-card">
        <div class="futures-card__name">나스닥100</div>
        <div class="futures-card__price">19,821.4</div>
        <div class="futures-card__change futures-card__change--down">▼ 45.2 (0.23%)</div>
      </div>
      <div class="futures-card">
        <div class="futures-card__name">코스피200</div>
        <div class="futures-card__price">344.8</div>
        <div class="futures-card__change futures-card__change--up">▲ 2.1 (0.61%)</div>
      </div>
      <div class="futures-card">
        <div class="futures-card__name">금(Gold)</div>
        <div class="futures-card__price">2,312.5</div>
        <div class="futures-card__change futures-card__change--up">▲ 8.4 (0.36%)</div>
      </div>
    </div>

    <!-- 검색 -->
    <div class="search-wrap">
      <div class="search-input-box">
        <input type="text" placeholder="ETF 검색 (종목명, 코드)">
        <span class="search-input-box__icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- 마이 리스트 -->
    <section class="wish-section">
      <div class="wish-section__header">
        <h2 class="wish-section__title">마이 리스트</h2>
        <button class="wish-section__more">전체보기 ›</button>
      </div>
      <!-- 탭 -->
      <div class="wish-tab">
        <button class="wish-tab__item wish-tab__item--active">관심상품</button>
        <button class="wish-tab__item">보유상품</button>
        <button class="wish-tab__item">알림상품</button>
        <button class="wish-tab__item">최근 본 상품</button>
      </div>
      <!-- 빈 상태 -->
      <div class="empty-state">
        <div class="empty-state__illust">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <p class="empty-state__text">관심상품을 담고<br>시세와 수익률 체크를 한 번에!</p>
        <button class="empty-state__btn">관심상품 등록하기</button>
      </div>
    </section>

    <div class="section-divider"></div>

    <!-- 포트폴리오 -->
    <section class="wish-section" style="padding-bottom:20px;">
      <div class="wish-section__header">
        <h2 class="wish-section__title">포트폴리오</h2>
        <button class="wish-section__more">전체보기 ›</button>
      </div>
      <!-- 탭 -->
      <div class="wish-tab">
        <button class="wish-tab__item wish-tab__item--active">전체</button>
        <button class="wish-tab__item">월배당</button>
        <button class="wish-tab__item">연금/ISA</button>
        <button class="wish-tab__item">증여</button>
        <button class="wish-tab__item">직접구성</button>
      </div>
      <!-- 빈 상태 -->
      <div class="empty-state">
        <div class="empty-state__illust">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <p class="empty-state__text">나만의 포트폴리오를<br>만들어 보세요!</p>
        <button class="empty-state__btn">포트폴리오 만들기</button>
      </div>
    </section>
  </main>

  <!-- 하단 탭바 -->
  <nav class="bottom-nav">
    <button class="bottom-nav__item bottom-nav__item--active">
      <span class="bottom-nav__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </span>
      홈
    </button>
    <button class="bottom-nav__item">
      <span class="bottom-nav__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      검색
    </button>
    <button class="bottom-nav__item">
      <span class="bottom-nav__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </span>
      포트폴리오
    </button>
    <button class="bottom-nav__item">
      <span class="bottom-nav__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
      </span>
      ETF
    </button>
    <button class="bottom-nav__item">
      <span class="bottom-nav__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      MY
    </button>
  </nav>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    /* 탭 전환 */
    $('.wish-tab__item').on('click', function() {
      $(this).siblings().removeClass('wish-tab__item--active');
      $(this).addClass('wish-tab__item--active');
    });
  </script>
</body>
</html>
