<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Header 컴포넌트 가이드</title>
  <link rel="stylesheet" href="../../css/common.css">
  <style>
    /* ===========================
       헤더 컴포넌트 스타일
       =========================== */

    /* 헤더 래퍼 */
    .header-comp {
      width: 390px;
      background: #fff;
      padding-top: 10px;
    }

    /* 네비게이션 바 */
    .header-navi {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 56px;
      padding-left: 20px;
      padding-right: 24px;
      position: relative;
    }

    /* 좌측 뒤로가기 버튼 */
    .header-btn-back {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-btn-back img {
      /* 피그마 원본: SVG 자연 크기 13.5×7.5px, 90도 회전으로 좌측 방향 표시 */
      width: 13.5px;
      height: 7.5px;
      transform: rotate(90deg);
      display: block;
    }

    /* 타이틀 */
    .header-title {
      flex: 1 0 0;
      font-size: 18px;
      font-weight: 700;
      line-height: 28px;
      color: #141924;
      margin: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* 우측 아이콘 그룹 */
    .header-icons {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    /* 개별 아이콘 버튼 */
    .header-icon-btn {
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon-btn img {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* 현재가 영역 (center 절대위치) */
    .header-price {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      background: #fff;
      padding: 0 4px;
      z-index: 1;
    }

    .header-price-label {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .header-price-label span {
      font-size: 10px;
      font-weight: 400;
      line-height: 14px;
      color: #697387;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .header-price-label img {
      /* 피그마 원본: 6.75×3.75px, -90도 회전으로 우측 방향 표시 */
      width: 6.75px;
      height: 3.75px;
      transform: rotate(-90deg);
      display: block;
    }

    .header-price-value {
      font-size: 12px;
      font-weight: 500;
      line-height: 16px;
      color: red;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ===========================
       가이드 페이지 레이아웃
       =========================== */
    .guide-variant {
      margin-bottom: 40px;
    }

    .guide-variant-title {
      font-size: 14px;
      color: #697387;
      margin: 0 0 8px 0;
      font-weight: 400;
    }

    .guide-variant-preview {
      border: 1px solid #e5e8ef;
      border-radius: 8px;
      overflow: hidden;
      width: 390px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Header 컴포넌트 가이드</h1>
  </header>

  <main>
    <!-- Variant 1: 기본형 (좌측 아이콘 + 타이틀 + 우측 아이콘 전체) -->
    <section class="guide-section">
      <h2 class="guide-section-title">Type=Sub</h2>

      <div class="guide-variant">
        <p class="guide-variant-title">기본형 — 뒤로가기 + 타이틀 + 우측 아이콘</p>
        <div class="guide-variant-preview">
          <div class="header-comp">
            <div class="header-navi">
              <!-- 좌측: 뒤로가기 -->
              <button class="header-btn-back" aria-label="뒤로가기">
                <img src="../../img/common/icon-chevron-left.svg" alt="뒤로가기" />
              </button>
              <!-- 타이틀 -->
              <p class="header-title">월배당 포트</p>
              <!-- 우측: 아이콘 그룹 -->
              <div class="header-icons">
                <button class="header-icon-btn" aria-label="공유">
                  <img src="../../img/common/icon-share.svg" alt="공유" />
                </button>
                <button class="header-icon-btn" aria-label="알림">
                  <img src="../../img/common/icon-bell.svg" alt="알림" />
                </button>
                <button class="header-icon-btn" aria-label="찜하기">
                  <img src="../../img/common/icon-heart.svg" alt="찜하기" />
                </button>
                <button class="header-icon-btn" aria-label="검색">
                  <img src="../../img/common/icon-search.svg" alt="검색" />
                </button>
                <button class="header-icon-btn" aria-label="스캔">
                  <img src="../../img/common/icon-scan.svg" alt="스캔" />
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Variant 2: 현재가 표시형 -->
      <div class="guide-variant">
        <p class="guide-variant-title">현재가 표시형 — 뒤로가기 + 현재가 + 우측 아이콘</p>
        <div class="guide-variant-preview">
          <div class="header-comp">
            <div class="header-navi">
              <!-- 좌측: 뒤로가기 -->
              <button class="header-btn-back" aria-label="뒤로가기">
                <img src="../../img/common/icon-chevron-left.svg" alt="뒤로가기" />
              </button>
              <!-- 중앙: 현재가 (절대위치) -->
              <div class="header-price">
                <div class="header-price-label">
                  <span>현재가</span>
                  <img src="../../img/common/icon-chevron-right-sm.svg" alt="" />
                </div>
                <p class="header-price-value">10,430원 +0.9%</p>
              </div>
              <!-- flex 공간 확보 (현재가는 절대위치이므로 레이아웃에 영향 없음) -->
              <div style="flex: 1;"></div>
              <!-- 우측: 아이콘 그룹 -->
              <div class="header-icons">
                <button class="header-icon-btn" aria-label="공유">
                  <img src="../../img/common/icon-share.svg" alt="공유" />
                </button>
                <button class="header-icon-btn" aria-label="알림">
                  <img src="../../img/common/icon-bell.svg" alt="알림" />
                </button>
                <button class="header-icon-btn" aria-label="찜하기">
                  <img src="../../img/common/icon-heart.svg" alt="찜하기" />
                </button>
                <button class="header-icon-btn" aria-label="검색">
                  <img src="../../img/common/icon-search.svg" alt="검색" />
                </button>
                <button class="header-icon-btn" aria-label="스캔">
                  <img src="../../img/common/icon-scan.svg" alt="스캔" />
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Variant 3: 좌측 아이콘 없음 -->
      <div class="guide-variant">
        <p class="guide-variant-title">좌측 아이콘 없음 — 타이틀 + 우측 아이콘</p>
        <div class="guide-variant-preview">
          <div class="header-comp">
            <div class="header-navi">
              <!-- 타이틀 -->
              <p class="header-title">월배당 포트</p>
              <!-- 우측: 아이콘 그룹 -->
              <div class="header-icons">
                <button class="header-icon-btn" aria-label="공유">
                  <img src="../../img/common/icon-share.svg" alt="공유" />
                </button>
                <button class="header-icon-btn" aria-label="알림">
                  <img src="../../img/common/icon-bell.svg" alt="알림" />
                </button>
                <button class="header-icon-btn" aria-label="찜하기">
                  <img src="../../img/common/icon-heart.svg" alt="찜하기" />
                </button>
                <button class="header-icon-btn" aria-label="검색">
                  <img src="../../img/common/icon-search.svg" alt="검색" />
                </button>
                <button class="header-icon-btn" aria-label="스캔">
                  <img src="../../img/common/icon-scan.svg" alt="스캔" />
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Variant 4: 타이틀 없음 -->
      <div class="guide-variant">
        <p class="guide-variant-title">타이틀 없음 — 뒤로가기 + 우측 아이콘</p>
        <div class="guide-variant-preview">
          <div class="header-comp">
            <div class="header-navi">
              <!-- 좌측: 뒤로가기 -->
              <button class="header-btn-back" aria-label="뒤로가기">
                <img src="../../img/common/icon-chevron-left.svg" alt="뒤로가기" />
              </button>
              <!-- 우측: 아이콘 그룹 -->
              <div class="header-icons" style="margin-left: auto;">
                <button class="header-icon-btn" aria-label="공유">
                  <img src="../../img/common/icon-share.svg" alt="공유" />
                </button>
                <button class="header-icon-btn" aria-label="알림">
                  <img src="../../img/common/icon-bell.svg" alt="알림" />
                </button>
                <button class="header-icon-btn" aria-label="찜하기">
                  <img src="../../img/common/icon-heart.svg" alt="찜하기" />
                </button>
                <button class="header-icon-btn" aria-label="검색">
                  <img src="../../img/common/icon-search.svg" alt="검색" />
                </button>
                <button class="header-icon-btn" aria-label="스캔">
                  <img src="../../img/common/icon-scan.svg" alt="스캔" />
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script src="../../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../../js/common.js"></script>
</body>
</html>
