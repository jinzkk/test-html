<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WISH. 헤더 컴포넌트 - 회원가입</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { background: #f2f3f8; margin: 0; font-family: 'Pretendard', sans-serif; }

    .page_header {
      width: 100%; height: 56px; background: #fff;
      display: flex; align-items: center; padding: 0 20px;
      box-sizing: border-box; border-bottom: 1px solid #f2f3f8;
    }
    .btn_back { background: none; border: none; cursor: pointer; padding: 0; }

    .showcase_info {
      margin: 20px 16px;
      background: #fff; border-radius: 12px; padding: 20px;
    }
    .showcase_info h2 { font-size: 16px; font-weight: 700; color: #141924; margin: 0 0 8px; }
    .showcase_info p { font-size: 14px; color: #697387; line-height: 20px; margin: 4px 0; }
    .showcase_tag {
      display: inline-block; background: #e8edfc; color: #1345d1;
      font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 4px; margin-top: 8px;
    }
  </style>
</head>
<body>
  <!-- 헤더 컴포넌트 (회원가입 흐름용 - 뒤로가기만) -->
  <header class="page_header">
    <button class="btn_back" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="#141924" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <!-- 컴포넌트 설명 -->
  <div class="showcase_info">
    <h2>헤더 컴포넌트 — 회원가입형</h2>
    <p>Figma Node ID: <strong>58:7940</strong></p>
    <p>회원가입 플로우에서 사용하는 헤더입니다. 뒤로가기 버튼만 표시됩니다.</p>
    <p>높이: 56px, 배경: #ffffff, 왼쪽 패딩: 20px</p>
    <span class="showcase_tag">Header / 회원가입</span>
  </div>

  <script src="../js/lib/jquery-3.7.1.min.js"></script>
  <script src="../js/common.js"></script>
</body>
</html>
