<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button 컴포넌트 가이드</title>
  <link rel="stylesheet" href="../../css/common.css">
</head>
<body>
  <header>
    <h1>Button 컴포넌트 가이드</h1>
  </header>

  <main>
    <!-- Tag: Solid 타입 -->
    <section class="guide_section">
      <h2 class="guide_section_title">Tag - Solid</h2>
      <div class="guide_row">
        <div class="guide_item">
          <span class="tag tag_solid_black">TAG</span>
        </div>
        <div class="guide_item">
          <span class="tag tag_solid_red">TAG</span>
        </div>
        <div class="guide_item">
          <span class="tag tag_solid_sky">TAG</span>
        </div>
        <div class="guide_item">
          <span class="tag tag_solid_blue">TAG</span>
        </div>
      </div>
    </section>

    <!-- Tag: Line 타입 -->
    <section class="guide_section">
      <h2 class="guide_section_title">Tag - Line</h2>
      <div class="guide_row">
        <div class="guide_item">
          <span class="tag tag_line_black">TAG</span>
        </div>
        <div class="guide_item">
          <span class="tag tag_line_red">TAG</span>
        </div>
        <div class="guide_item">
          <span class="tag tag_line_sky">TAG</span>
        </div>
        <div class="guide_item">
          <span class="tag tag_line_blue">TAG</span>
        </div>
      </div>
    </section>

    <!-- Button: Primary -->
    <section class="guide_section">
      <h2 class="guide_section_title">Button - Primary</h2>
      <div class="guide_row">
        <div class="guide_item">
          <button class="btn btn_primary btn_size_52">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_primary btn_size_48">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_primary btn_size_40">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_primary btn_size_28">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_primary btn_size_26">Button</button>
        </div>
      </div>
    </section>

    <!-- Button: Secondary -->
    <section class="guide_section">
      <h2 class="guide_section_title">Button - Secondary</h2>
      <div class="guide_row">
        <div class="guide_item">
          <button class="btn btn_secondary btn_size_52">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_secondary btn_size_48">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_secondary btn_size_40">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_secondary btn_size_28">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_secondary btn_size_26">Button</button>
        </div>
      </div>
    </section>

    <!-- Button: Tertiary -->
    <section class="guide_section">
      <h2 class="guide_section_title">Button - Tertiary</h2>
      <div class="guide_row">
        <div class="guide_item">
          <button class="btn btn_tertiary btn_size_52">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_tertiary btn_size_48">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_tertiary btn_size_40">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_tertiary btn_size_28">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_tertiary btn_size_26">Button</button>
        </div>
      </div>
    </section>

    <!-- Button: Function -->
    <section class="guide_section">
      <h2 class="guide_section_title">Button - Function</h2>
      <div class="guide_row">
        <div class="guide_item">
          <button class="btn btn_function btn_size_52">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_function btn_size_48">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_function btn_size_40">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_function btn_size_28">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_function btn_size_26">Button</button>
        </div>
      </div>
    </section>

    <!-- Button: Error -->
    <section class="guide_section">
      <h2 class="guide_section_title">Button - Error</h2>
      <div class="guide_row">
        <div class="guide_item">
          <button class="btn btn_error btn_size_52">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_error btn_size_48">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_error btn_size_40">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_error btn_size_28">Button</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_error btn_size_26">Button</button>
        </div>
      </div>
    </section>

    <!-- Button: Disabled 상태 -->
    <section class="guide_section">
      <h2 class="guide_section_title">Button - Disabled</h2>
      <div class="guide_row">
        <div class="guide_item">
          <button class="btn btn_primary btn_size_48" disabled>Primary</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_secondary btn_size_48" disabled>Secondary</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_tertiary btn_size_48" disabled>Tertiary</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_function btn_size_48" disabled>Function</button>
        </div>
        <div class="guide_item">
          <button class="btn btn_error btn_size_48" disabled>Error</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 HTML5 프로젝트 - Button 컴포넌트 가이드</p>
  </footer>

  <!-- jQuery 로드 -->
  <script src="../../js/lib/jquery-3.7.1.min.js"></script>
  <!-- 공통 JS 로드 -->
  <script src="../../js/common.js"></script>
</body>
</html>
