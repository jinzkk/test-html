<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF_8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab 컴포넌트 가이드</title>
  <link rel="stylesheet" href="../../css/common.css">
</head>
<body>
  <header>
    <h1>Tab 컴포넌트 가이드</h1>
  </header>

  <main>
    <!-- Tab/Small (pill형 소형) -->
    <section class="guide_section">
      <h2 class="guide_section_title">Tab / Small (Pill형 소형)</h2>
      <div class="guide_row">
        <div class="guide_item">
          <div class="tab_small">
            <button class="tab_small_item tab_small_item_active" data-tab-group="small">탭 1</button>
            <button class="tab_small_item" data-tab-group="small">탭 2</button>
            <button class="tab_small_item" data-tab-group="small">탭 3</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab/Top (pill형 전체너비) -->
    <section class="guide_section">
      <h2 class="guide_section_title">Tab / Top (Pill형 전체너비)</h2>
      <div class="guide_row">
        <div class="guide_item">
          <div class="tab_top">
            <button class="tab_top_item tab_top_item_active" data-tab-group="top">탭 1</button>
            <button class="tab_top_item" data-tab-group="top">탭 2</button>
            <button class="tab_top_item" data-tab-group="top">탭 3</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab/Medium (버튼형) -->
    <section class="guide_section">
      <h2 class="guide_section_title">Tab / Medium (버튼형)</h2>
      <div class="guide_row">
        <div class="guide_item">
          <div class="tab_medium">
            <button class="tab_medium_item tab_medium_item_active" data-tab-group="medium">탭 1</button>
            <button class="tab_medium_item" data-tab-group="medium">탭 2</button>
            <button class="tab_medium_item" data-tab-group="medium">탭 3</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab_Line/Small (언더라인형) -->
    <section class="guide_section">
      <h2 class="guide_section_title">Tab_Line / Small (언더라인형)</h2>
      <div class="guide_row">
        <div class="guide_item" style="width: 312px;">
          <div class="tab_line_small">
            <button class="tab_line_small_item tab_line_small_item_active" data-tab-group="line_small">탭 1</button>
            <button class="tab_line_small_item" data-tab-group="line_small">탭 2</button>
            <button class="tab_line_small_item" data-tab-group="line_small">탭 3</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab_Line/Large (언더라인형 대형) -->
    <section class="guide_section">
      <h2 class="guide_section_title">Tab_Line / Large (언더라인형 대형)</h2>
      <div class="guide_row">
        <div class="guide_item" style="width: 312px;">
          <div class="tab_line_large">
            <button class="tab_line_large_item tab_line_large_item_active" data-tab-group="line_large">탭 1</button>
            <button class="tab_line_large_item" data-tab-group="line_large">탭 2</button>
            <button class="tab_line_large_item" data-tab-group="line_large">탭 3</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 HTML5 프로젝트 - Tab 컴포넌트 가이드</p>
  </footer>

  <!-- jQuery 로드 -->
  <script src="../../js/lib/jquery-3.7.1.min.js"></script>
  <!-- 공통 JS 로드 -->
  <script src="../../js/common.js"></script>
  <script>
    // 탭 클릭 이벤트 처리
    $(function () {
      // Tab/Small
      $('[data-tab-group="small"]').on('click', function () {
        $('[data-tab-group="small"]').removeClass('tab_small_item_active');
        $(this).addClass('tab_small_item_active');
      });

      // Tab/Top
      $('[data-tab-group="top"]').on('click', function () {
        $('[data-tab-group="top"]').removeClass('tab_top_item_active');
        $(this).addClass('tab_top_item_active');
      });

      // Tab/Medium
      $('[data-tab-group="medium"]').on('click', function () {
        $('[data-tab-group="medium"]').removeClass('tab_medium_item_active');
        $(this).addClass('tab_medium_item_active');
      });

      // Tab_Line/Small
      $('[data-tab-group="line_small"]').on('click', function () {
        $('[data-tab-group="line_small"]').removeClass('tab_line_small_item_active');
        $(this).addClass('tab_line_small_item_active');
      });

      // Tab_Line/Large
      $('[data-tab-group="line_large"]').on('click', function () {
        $('[data-tab-group="line_large"]').removeClass('tab_line_large_item_active');
        $(this).addClass('tab_line_large_item_active');
      });
    });
  </script>
</body>
</html>
